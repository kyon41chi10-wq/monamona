          const py = cy + ((seed * (i + 5) * 13) % 100 - 50) / 100 * hh;
          const ts = Math.max(2, z * 3.5);
          ctx.fillStyle = 'rgba(30,80,20,0.55)';
          ctx.beginPath();
          ctx.moveTo(px, py - ts * 1.4);
          ctx.lineTo(px - ts, py + ts * 0.5);
          ctx.lineTo(px + ts, py + ts * 0.5);
          ctx.closePath(); ctx.fill();
        }
      } else if (tId === TERRAIN.MOUNTAIN.id) {
        // 岩のひび割れ風ライン
        ctx.strokeStyle = 'rgba(60,50,40,0.3)';
        ctx.lineWidth = Math.max(0.5, z * 0.7);
        const seed = gx * 17 + gy * 7;
        const ox = ((seed * 33) % 60 - 30) / 100 * hw;
        const oy = ((seed * 51) % 60 - 30) / 100 * hh;
        ctx.beginPath();
        ctx.moveTo(cx + ox - hw * 0.3, cy + oy - hh * 0.1);
        ctx.lineTo(cx + ox + hw * 0.3, cy + oy + hh * 0.15);
        ctx.stroke();
      }
    };

    // ===== タイルループ描画 =====
    for (const packed of tileList) {
      const gx = packed % 10000, gy = Math.floor(packed / 10000);
      const tId = map.tiles[gy * map.dim + gx];
      const h   = map.heights[gy * map.dim + gx];
      const terrain = TERRAIN_LIST.find(t2 => t2.id === tId) || TERRAIN.PLAIN;
      const jitter = ((gx * 13 + gy * 7) % 9) - 4;

      const wx0 = gx * CELL, wx1 = (gx + 1) * CELL;
      const wy0 = gy * CELL, wy1 = (gy + 1) * CELL;
      const pNW = cam.worldToScreen(wx0, wy0, h);
      const pNE = cam.worldToScreen(wx1, wy0, h);
      const pSE = cam.worldToScreen(wx1, wy1, h);
      const pSW = cam.worldToScreen(wx0, wy1, h);

      // --- 南面 ---
      const hs = map.heightAtTile(gx, gy + 1);
      if (h > hs) {
        const pSW2 = cam.worldToScreen(wx0, wy1, hs);
        const pSE2 = cam.worldToScreen(wx1, wy1, hs);
        const sideS = darkenHex(terrain.color, 0.45);
        ctx.beginPath();
        ctx.moveTo(pSW.x, pSW.y); ctx.lineTo(pSE.x, pSE.y);
        ctx.lineTo(pSE2.x, pSE2.y); ctx.lineTo(pSW2.x, pSW2.y);
        ctx.closePath();
        ctx.fillStyle = sideS; ctx.fill();
        if (showDetail && tId !== TERRAIN.WATER.id) {
          const brickLight = shadeRgbAmt(sideS, 20);
          _drawBrickLines(pSW, pSE, pSE2, pSW2, brickLight, Math.max(1, h - hs));
        }
      }

      // --- 東面 ---
      const he = map.heightAtTile(gx + 1, gy);
      if (h > he) {
        const pNE2 = cam.worldToScreen(wx1, wy0, he);
        const pSE2 = cam.worldToScreen(wx1, wy1, he);
        const sideE = darkenHex(terrain.color, 0.28);
        ctx.beginPath();
        ctx.moveTo(pNE.x, pNE.y); ctx.lineTo(pSE.x, pSE.y);
        ctx.lineTo(pSE2.x, pSE2.y); ctx.lineTo(pNE2.x, pNE2.y);
        ctx.closePath();
        ctx.fillStyle = sideE; ctx.fill();
        if (showDetail && tId !== TERRAIN.WATER.id) {
          const brickLight = shadeRgbAmt(sideE, 18);
          _drawBrickLines(pNE, pSE, pSE2, pNE2, brickLight, Math.max(1, h - he));
        }
      }

      // --- 上面 ---
      ctx.beginPath();
      ctx.moveTo(pNW.x, pNW.y); ctx.lineTo(pNE.x, pNE.y);
      ctx.lineTo(pSE.x, pSE.y); ctx.lineTo(pSW.x, pSW.y);
      ctx.closePath();

      if (tId === TERRAIN.WATER.id) {
        // 水: アニメーション波紋
        const wave = Math.sin(t * 1.8 + gx * 0.6 + gy * 0.9) * 0.12 + 0.88;
        ctx.fillStyle = `rgba(47,95,134,${wave})`;
        ctx.fill();
        // 白いハイライトライン
        if (showDetail) {
          ctx.strokeStyle = `rgba(180,225,255,${0.35 + Math.sin(t * 2.5 + gx + gy) * 0.15})`;
          ctx.lineWidth = Math.max(0.5, z);
          const mx = (pNW.x + pSE.x) / 2, my = (pNW.y + pSE.y) / 2;
          ctx.beginPath(); ctx.moveTo(pNW.x, pNW.y + 1); ctx.lineTo(mx, my + 0.5); ctx.stroke();
        }
      } else {
        ctx.fillStyle = shadeRgbAmt(terrain.color, jitter);
        ctx.fill();
        _drawTopTexture([pNW, pNE, pSE, pSW], tId, gx, gy);
      }

      // 側面との輪郭線
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = Math.max(0.3, z * 0.5);
      ctx.beginPath();
      ctx.moveTo(pNW.x, pNW.y); ctx.lineTo(pNE.x, pNE.y);
      ctx.lineTo(pSE.x, pSE.y); ctx.lineTo(pSW.x, pSW.y);
      ctx.closePath(); ctx.stroke();

      // 領土オーバーレイ: 足跡による勢力色染め (モナークモナーク式)
      if (this.territory) {
        const owner = this.territory[gy * map.dim + gx];
        if (owner !== 255) {
          const ownerFac = this.factions.get(owner);
          if (ownerFac) {
            ctx.beginPath();
            ctx.moveTo(pNW.x, pNW.y); ctx.lineTo(pNE.x, pNE.y);
            ctx.lineTo(pSE.x, pSE.y); ctx.lineTo(pSW.x, pSW.y);
            ctx.closePath();
            // プレイヤーは少し濃く、他は薄め
            const alpha = owner === 0 ? '55' : '38';
            ctx.fillStyle = ownerFac.color + alpha;
            ctx.fill();
          }
        }
      }
    }

    // ===== 滝エフェクト(水面に接する崖) =====
    if (showDetail) {
      for (const packed of tileList) {
        const gx = packed % 10000, gy = Math.floor(packed / 10000);
        const tId = map.tiles[gy * map.dim + gx];
        if (tId === TERRAIN.WATER.id) continue;
        const h = map.heights[gy * map.dim + gx];
        const wx0 = gx * CELL, wx1 = (gx + 1) * CELL;
        const wy0 = gy * CELL, wy1 = (gy + 1) * CELL;
        const drawFall = (x, y1, y2) => {
          const p1 = cam.worldToScreen(x, y1, h), p2 = cam.worldToScreen(x, y2, h);
          const p3 = cam.worldToScreen(x, y2, 0), p4 = cam.worldToScreen(x, y1, 0);
          if (Math.abs(p1.y - p3.y) < 3) return;
          const wfAlpha = 0.55 + Math.sin(t * 3 + x * 0.05) * 0.12;
          const wfGrad = ctx.createLinearGradient(0, p1.y, 0, p3.y);
          wfGrad.addColorStop(0,   `rgba(180,230,255,${wfAlpha})`);
          wfGrad.addColorStop(0.5, `rgba(140,200,240,${wfAlpha * 0.7})`);
          wfGrad.addColorStop(1,   `rgba(80,160,220,${wfAlpha * 0.4})`);
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
          ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
          ctx.closePath();
          ctx.fillStyle = wfGrad; ctx.fill();
        };
        const hs = map.heightAtTile(gx, gy + 1);
        if (hs === 0 && h > 0) drawFall(wx1, wy1, wy0);
        const he = map.heightAtTile(gx + 1, gy);
        if (he === 0 && h > 0) drawFall(wx1, wy0, wy1);
      }
    }

    // ===== 柵描画 =====
    for (const fence of this.fences.values()) {
      if (fence.x < vb.x0 - 30 || fence.x > vb.x1 + 30 || fence.y < vb.y0 - 30 || fence.y > vb.y1 + 30) continue;
      const h  = map.heightAtWorld(fence.x, fence.y);
      const gp = cam.worldToScreen(fence.x, fence.y, h);
      const fac = this.factions.get(fence.factionId);
      const col = fac ? fac.color : '#a08060';
      const fs  = Math.max(3, 10 * z);
      const hpPct = fence.hp / fence.maxHp;
      // 土台
      ctx.beginPath();
      ctx.moveTo(gp.x,        gp.y + fs * 0.15);
      ctx.lineTo(gp.x + fs * 1.1, gp.y - fs * 0.3);
      ctx.lineTo(gp.x,        gp.y - fs * 0.8);
      ctx.lineTo(gp.x - fs * 1.1, gp.y - fs * 0.3);
      ctx.closePath();
      ctx.fillStyle = darkenHex('#8a7060', 0.2); ctx.fill();
      // 杭3本
      for (let i = -1; i <= 1; i++) {
        const px = gp.x + i * fs * 0.55, py = gp.y - fs * 0.45;
        ctx.beginPath();
        ctx.moveTo(px - fs * 0.18, py + fs * 0.55);
        ctx.lineTo(px + fs * 0.18, py + fs * 0.55);
        ctx.lineTo(px + fs * 0.12, py - fs * 0.9);
        ctx.lineTo(px, py - fs * 1.1);
        ctx.lineTo(px - fs * 0.12, py - fs * 0.9);
        ctx.closePath();
        ctx.fillStyle = hpPct > 0.5 ? '#c8a870' : '#a07040';
        ctx.fill();
        ctx.strokeStyle = darkenHex('#c8a870', 0.3); ctx.lineWidth = 0.8; ctx.stroke();
      }
      // 横木
      ctx.beginPath();
      ctx.rect(gp.x - fs * 0.95, gp.y - fs * 0.8, fs * 1.9, Math.max(1.5, fs * 0.22));
      ctx.fillStyle = '#d4aa80'; ctx.fill();
      ctx.beginPath();
      ctx.rect(gp.x - fs * 0.9, gp.y - fs * 0.3, fs * 1.8, Math.max(1, fs * 0.18));
      ctx.fillStyle = '#d4aa80'; ctx.fill();
      // 勢力カラー旗
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(gp.x, gp.y - fs * 1.05);
      ctx.lineTo(gp.x + fs * 0.45, gp.y - fs * 0.82);
      ctx.lineTo(gp.x, gp.y - fs * 0.6);
      ctx.closePath(); ctx.fill();
      // 残存HPバー
      if (hpPct < 0.99 && showDetail) {
        const bw = fs * 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(gp.x - bw / 2, gp.y - fs * 1.5, bw, 3);
        ctx.fillStyle = hpPct > 0.5 ? '#60d060' : '#e04040';
        ctx.fillRect(gp.x - bw / 2, gp.y - fs * 1.5, bw * hpPct, 3);
      }
    }

    // ===== エンティティ描画(奥行きソート) =====
    const items = [];
    for (const fd of this.food.values()) {
      if (fd.x < vb.x0 || fd.x > vb.x1 || fd.y < vb.y0 || fd.y > vb.y1) continue;
      items.push({ kind: 'food', ref: fd, depth: fd.x + fd.y });
    }
    for (const b of this.bases.values()) {
      if (b.x < vb.x0 - b.radius || b.x > vb.x1 + b.radius ||
          b.y < vb.y0 - b.radius || b.y > vb.y1 + b.radius) continue;
      items.push({ kind: 'base', ref: b, depth: b.x + b.y - 2 });
    }
    for (const mi of this.mapItems.values()) {
      if (mi.x < vb.x0 || mi.x > vb.x1 || mi.y < vb.y0 || mi.y > vb.y1) continue;
      items.push({ kind: 'mapitem', ref: mi, depth: mi.x + mi.y });
    }
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      if (u.x < vb.x0 || u.x > vb.x1 || u.y < vb.y0 || u.y > vb.y1) continue;
      items.push({ kind: 'unit', ref: u, depth: u.x + u.y });
    }
    items.sort((a, b2) => a.depth - b2.depth);

    for (const it of items) {
      const h  = map.heightAtWorld(it.ref.x, it.ref.y);
      const gp = cam.worldToScreen(it.ref.x, it.ref.y, h);

      // ---- マップアイテム (クリスタル/資金袋/時計) ----
      if (it.kind === 'mapitem') {
        const mi = it.ref;
        const pulse = 1 + 0.12 * Math.sin(t * 3 + mi.x * 0.05);
        const r = Math.max(3, 7 * z * pulse);
        ctx.beginPath(); ctx.ellipse(gp.x, gp.y + r * 0.25, r * 1.1, r * 0.45, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
        const py = gp.y - r;
        if (mi.type === 'crystal') {
          // 水晶: 青紫の菱形
          const cg = ctx.createRadialGradient(gp.x - r * 0.2, py - r * 0.3, 0, gp.x, py, r * 1.2);
          cg.addColorStop(0, '#e0d0ff'); cg.addColorStop(0.5, '#8844cc'); cg.addColorStop(1, '#441188');
          ctx.beginPath();
          ctx.moveTo(gp.x, py - r * 1.2); ctx.lineTo(gp.x + r * 0.7, py);
          ctx.lineTo(gp.x, py + r * 0.6); ctx.lineTo(gp.x - r * 0.7, py);
          ctx.closePath(); ctx.fillStyle = cg; ctx.fill();
          ctx.strokeStyle = '#ccaaff'; ctx.lineWidth = 1; ctx.stroke();
        } else if (mi.type === 'gold') {
          // 資金袋: 黄金の円
          const gg = ctx.createRadialGradient(gp.x - r * 0.25, py - r * 0.25, 0, gp.x, py, r);
          gg.addColorStop(0, '#fff0a0'); gg.addColorStop(0.5, '#e8a820'); gg.addColorStop(1, '#805010');
          ctx.beginPath(); ctx.arc(gp.x, py, r, 0, Math.PI * 2);
          ctx.fillStyle = gg; ctx.fill();
          ctx.strokeStyle = '#ffd060'; ctx.lineWidth = 1.2; ctx.stroke();
          ctx.fillStyle = '#805010'; ctx.font = `bold ${Math.max(5, r * 0.85)}px sans-serif`;
          ctx.textAlign = 'center'; ctx.fillText('G', gp.x, py + r * 0.32);
        } else if (mi.type === 'clock') {
          // 時計: 白い円+針
          ctx.beginPath(); ctx.arc(gp.x, py, r, 0, Math.PI * 2);
          ctx.fillStyle = '#f8f8f0'; ctx.fill();
          ctx.strokeStyle = '#888860'; ctx.lineWidth = 1.5; ctx.stroke();
          ctx.strokeStyle = '#444422'; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(gp.x, py); ctx.lineTo(gp.x, py - r * 0.65); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(gp.x, py); ctx.lineTo(gp.x + r * 0.45, py + r * 0.25); ctx.stroke();
        }
        if (showDetail) {
          const label = mi.type === 'crystal' ? 'クリスタル' : mi.type === 'gold' ? '資金袋' : '時計';
          ctx.fillStyle = '#ffffff'; ctx.font = `${Math.max(8, 10 * z)}px sans-serif`;
          ctx.textAlign = 'center'; ctx.fillText(label, gp.x, py - r - 4);
        }
        continue;
      }

      // ---- 食料 ----
      if (it.kind === 'food') {
        const r = Math.max(1.8, 3.5 * z);
        // 影
        ctx.beginPath(); ctx.ellipse(gp.x, gp.y + r * 0.3, r * 1.1, r * 0.45, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
        // 実(金色の球)
        const fg = ctx.createRadialGradient(gp.x - r * 0.25, gp.y - r * 1.1, r * 0.1, gp.x, gp.y - r * 0.9, r);
        fg.addColorStop(0, '#ffe87a'); fg.addColorStop(0.6, '#e8a820'); fg.addColorStop(1, '#a06010');
        ctx.beginPath(); ctx.arc(gp.x, gp.y - r * 0.9, r, 0, Math.PI * 2);
        ctx.fillStyle = fg; ctx.fill();
        continue;
      }

      // ---- 拠点(3D建物) ----
      if (it.kind === 'base') {
        const b   = it.ref;
        const fac = this.factions.get(b.factionId);
        const col = fac ? fac.color : '#888888';
        const s   = Math.max(3, b.radius * 0.55 * z); // 建物スケール

        // 地面プレート(アイソメタイル状)
        const p0 = { x: gp.x,         y: gp.y - s * 0.5 };
        const p1 = { x: gp.x + s * 1.1, y: gp.y };
        const p2 = { x: gp.x,         y: gp.y + s * 0.5 };
        const p3 = { x: gp.x - s * 1.1, y: gp.y };
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
        ctx.closePath();
        ctx.fillStyle = darkenHex(col, 0.55); ctx.fill();
        ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.stroke();

        const wallH = b.isHQ ? s * 2.2 : s * 1.3;
        // 右壁
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p2.x, p2.y - wallH); ctx.lineTo(p1.x, p1.y - wallH);
        ctx.closePath();
        ctx.fillStyle = darkenHex(col, 0.38); ctx.fill();
        ctx.strokeStyle = darkenHex(col, 0.2); ctx.lineWidth = 0.8; ctx.stroke();
        // 左壁
        ctx.beginPath();
        ctx.moveTo(p3.x, p3.y); ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p2.x, p2.y - wallH); ctx.lineTo(p3.x, p3.y - wallH);
        ctx.closePath();
        ctx.fillStyle = darkenHex(col, 0.25); ctx.fill();
        ctx.strokeStyle = darkenHex(col, 0.15); ctx.lineWidth = 0.8; ctx.stroke();
        // 屋根(上面ひし形)
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y - wallH); ctx.lineTo(p1.x, p1.y - wallH);
        ctx.lineTo(p2.x, p2.y - wallH); ctx.lineTo(p3.x, p3.y - wallH);
        ctx.closePath();
        ctx.fillStyle = shadeRgbAmt(col, 30); ctx.fill();
        ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.stroke();

        // HQは塔の上に尖塔
        if (b.isHQ) {
          const tipX = p0.x, tipY = p0.y - wallH - s * 1.5;
          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y - wallH); ctx.lineTo(p1.x, p1.y - wallH);
          ctx.lineTo(tipX, tipY); ctx.closePath();
          ctx.fillStyle = shadeRgbAmt(col, 50); ctx.fill();
          ctx.beginPath();
          ctx.moveTo(p0.x, p0.y - wallH); ctx.lineTo(p3.x, p3.y - wallH);
          ctx.lineTo(tipX, tipY); ctx.closePath();
          ctx.fillStyle = shadeRgbAmt(col, 35); ctx.fill();
        }

        // 占領プログレスバー
        if (b.capturingFactionId != null && b.capturingFactionId !== b.factionId) {
          const capFac = this.factions.get(b.capturingFactionId);
          const barY = gp.y - wallH - (b.isHQ ? s * 1.5 : 0) - s * 0.8;
          const bw = s * 2, bh = Math.max(3, z * 4);
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(gp.x - bw / 2, barY, bw, bh);
          ctx.fillStyle = capFac ? capFac.color : '#fff';
          ctx.fillRect(gp.x - bw / 2, barY, bw * b.captureProgress / 100, bh);
        }

        // 旗
        if (showDetail) {
          const flagX = p0.x, flagY = p0.y - wallH - (b.isHQ ? s * 1.5 : 0) - s * 0.2;
          const poleH = Math.max(4, z * 9);
          ctx.strokeStyle = '#ccbbaa'; ctx.lineWidth = Math.max(1, z);
          ctx.beginPath(); ctx.moveTo(flagX, flagY); ctx.lineTo(flagX, flagY - poleH); ctx.stroke();
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.moveTo(flagX, flagY - poleH);
          ctx.lineTo(flagX + poleH * 0.7, flagY - poleH + poleH * 0.25);
          ctx.lineTo(flagX, flagY - poleH + poleH * 0.5);
          ctx.closePath(); ctx.fill();

          ctx.fillStyle = '#eaf2f8';
          ctx.font = `bold ${Math.max(8, Math.min(12, 10 * z))}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(`${b.name}`, gp.x, flagY - poleH - 3);
        }
        continue;
      }

      // ---- ユニットスプライト ----
      const u   = it.ref;
      const fac = this.factions.get(u.factionId);
      const col = fac ? fac.color : '#cccccc';
      const isSelected = u.flockId != null && this.selectedFlockIds.has(u.flockId);
      const sc  = Math.max(1.8, (u.isLeader ? 7 : 5) * Math.min(z, 1.6));

      // 接地影
      ctx.beginPath();
      ctx.ellipse(gp.x, gp.y + sc * 0.2, sc * 1.1, sc * 0.45, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.32)'; ctx.fill();

      // 選択リング(地面)
      if (isSelected) {
        ctx.beginPath();
        ctx.ellipse(gp.x, gp.y + sc * 0.1, sc * 1.4, sc * 0.58, 0, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = Math.max(1, z * 1.2);
        ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
      }

      const by = gp.y - sc * 0.2; // 胴体中心Y

      // 胴体(ひし形っぽい台形)
      const bodyW = sc * 0.72, bodyH = sc * 1.1;
      const bodyCol = col;
      const armCol  = darkenHex(col, 0.25);
      ctx.beginPath();
      ctx.moveTo(gp.x,          by - bodyH * 0.55);
      ctx.lineTo(gp.x + bodyW,  by);
      ctx.lineTo(gp.x,          by + bodyH * 0.55);
      ctx.lineTo(gp.x - bodyW,  by);
      ctx.closePath();
      const bodyGrad = ctx.createRadialGradient(gp.x - bodyW * 0.2, by - bodyH * 0.1, 0, gp.x, by, bodyW * 1.2);
      bodyGrad.addColorStop(0, shadeRgbAmt(col, 40));
      bodyGrad.addColorStop(1, armCol);
      ctx.fillStyle = bodyGrad; ctx.fill();
      ctx.strokeStyle = darkenHex(col, 0.4); ctx.lineWidth = Math.max(0.6, z * 0.8); ctx.stroke();

      // 頭(円)
      const headY = by - bodyH * 0.72, headR = sc * 0.42;
      const skinTone = '#e8c090';
      ctx.beginPath(); ctx.arc(gp.x, headY, headR, 0, Math.PI * 2);
      ctx.fillStyle = skinTone; ctx.fill();
      // ヘルメット
      ctx.beginPath();
      ctx.arc(gp.x, headY, headR, Math.PI, 0);
      ctx.closePath();
      ctx.fillStyle = darkenHex(col, 0.1); ctx.fill();
      ctx.strokeStyle = darkenHex(col, 0.3); ctx.lineWidth = Math.max(0.5, z * 0.7); ctx.stroke();

      // リーダー: 金の星
      if (u.isLeader) {
        const starY = headY - headR - sc * 0.5;
        ctx.fillStyle = '#ffe04a';
        ctx.font = `${Math.max(6, sc * 0.9)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('★', gp.x, starY);
      }

      // ===== 戦力数値バッジ (モナークモナーク核心ビジュアル) =====
      {
        const pwrStr = u.power >= 1000 ? `${(u.power/1000).toFixed(1)}k` : String(u.power);
        const badgeY = headY - headR - sc * 0.4;

        if (z >= 0.7) {
          const fontSize = Math.max(6, Math.min(14, sc * 1.1));
          ctx.font = `bold ${fontSize}px monospace`;
          const tw = ctx.measureText(pwrStr).width;
          const bw = tw + fontSize * 0.7, bh = fontSize * 1.3;
          const bx = gp.x - bw / 2, by2 = badgeY - bh / 2;
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.roundRect ? ctx.roundRect(bx, by2, bw, bh, bh / 2)
                        : ctx.rect(bx, by2, bw, bh);
          ctx.fill();
          ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.7; ctx.stroke();
          ctx.fillStyle = '#ffffff';
          ctx.textAlign = 'center';
          ctx.fillText(pwrStr, gp.x, badgeY + fontSize * 0.38);

          // ===== 思考フキダシ (バッジの上に白い吹き出し) =====
          if (z > 0.8) {
            const st = u.state, ord = u.order;
            let icon = '';
            if (ord === FLOCK_ORDER.BUILD) icon = '🔨';
            else if (st === UNIT_STATE.ATTACK || ord === FLOCK_ORDER.ATTACK) icon = '⚔';
            else if (st === UNIT_STATE.SEEK_FOOD) icon = '🍖';
            else if (st === UNIT_STATE.RETREAT || ord === FLOCK_ORDER.RETREAT) icon = '↩';
            else if (st === UNIT_STATE.MOVE   || ord === FLOCK_ORDER.MOVE)    icon = '→';
            else if (ord === FLOCK_ORDER.DEFEND) icon = '◎';
            else if (ord === 'occupy')           icon = '⚑';
            else if (ord === FLOCK_ORDER.EXPLORE) icon = '?';
            if (icon) {
              const bubR  = Math.max(5, fontSize * 0.9);
              const bubX  = gp.x;
              const bubY  = by2 - bubR * 1.5;
              // 白い丸フキダシ
              ctx.beginPath(); ctx.arc(bubX, bubY, bubR, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
              ctx.strokeStyle = darkenHex(col, 0.25); ctx.lineWidth = 0.8; ctx.stroke();
              // しっぽ
              ctx.beginPath();
              ctx.moveTo(bubX - bubR * 0.22, bubY + bubR * 0.82);
              ctx.lineTo(bubX,               by2 - 1);
              ctx.lineTo(bubX + bubR * 0.22, bubY + bubR * 0.82);
              ctx.closePath();
              ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.fill();
              // アイコン
              ctx.fillStyle = '#222222';
              ctx.font = `${Math.max(5, bubR * 1.1)}px sans-serif`;
              ctx.textAlign = 'center';
              ctx.fillText(icon, bubX, bubY + bubR * 0.38);
            }
          }
        } else {
          // ズームアウト時: コンパクトな数値のみ
          const fontSize = Math.max(4, sc * 0.9);
          ctx.font = `bold ${fontSize}px monospace`;
          ctx.fillStyle = '#ffffff';
          ctx.strokeStyle = darkenHex(col, 0.5);
          ctx.lineWidth = 1.5;
          ctx.textAlign = 'center';
          ctx.strokeText(pwrStr, gp.x, badgeY + fontSize * 0.4);
          ctx.fillText(pwrStr, gp.x, badgeY + fontSize * 0.4);
        }

        if (u.hunger > 110) {
          ctx.fillStyle = '#ff3030';
          ctx.font = `bold ${Math.max(5, sc * 0.8)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText('!', gp.x + sc * 0.9, headY - headR - sc * 0.1);
        }
      }
    }

    // ===== 選択フロック 中心パルス =====
    for (const fid of this.selectedFlockIds) {
      const fl = this.flocks.get(fid);
      if (!fl) continue;
      const c = fl.centroid(this.units);
      if (!c) continue;
      const hc = map.heightAtWorld(c.x, c.y);
      const p  = cam.worldToScreen(c.x, c.y, hc);
      const pr = 16 + 5 * Math.sin(t * 4);
      ctx.beginPath(); ctx.arc(p.x, p.y, pr, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.setLineDash([4, 4]); ctx.lineWidth = 1.5; ctx.stroke(); ctx.setLineDash([]);
    }

    // ===== 範囲選択矩形 =====
    if (this.boxSelectRect) {
      const r = this.boxSelectRect;
      const x = Math.min(r.x0, r.x1), y = Math.min(r.y0, r.y1);
      const w = Math.abs(r.x1 - r.x0), h2 = Math.abs(r.y1 - r.y0);
      ctx.fillStyle = 'rgba(120,180,255,0.12)';
      ctx.strokeStyle = 'rgba(180,220,255,0.9)';
      ctx.lineWidth = 1.2; ctx.setLineDash([4, 3]);
      ctx.fillRect(x, y, w, h2); ctx.strokeRect(x, y, w, h2);
      ctx.setLineDash([]);
    }

    // 時間停止オーバーレイ
    if (this.elapsed < this.timeStopUntil) {
      const rem = Math.ceil(this.timeStopUntil - this.elapsed);
      ctx.fillStyle = 'rgba(180,220,255,0.08)';
      ctx.fillRect(0, 0, cv.width, cv.height);
      ctx.strokeStyle = 'rgba(180,220,255,0.6)';
      ctx.lineWidth = 3;
      ctx.strokeRect(2, 2, cv.width - 4, cv.height - 4);
      ctx.fillStyle = '#b8dcff';
      ctx.font = `bold ${Math.max(14, cv.width * 0.03)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(`⏰ 時間停止中 ${rem}s`, cv.width / 2, 32);
    }

    ctx.restore();
  }

  drawMinimap() {
    const ctx = this.mctx, cv = this.minimapCanvas;
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = '#06101a';
    ctx.fillRect(0, 0, cv.width, cv.height);
    if (!this.map) return;
    const scale = cv.width / WORLD_SIZE;

    // 地形ベース
    ctx.drawImage(this.map.offscreen, 0, 0, cv.width, cv.height);

    // 領土オーバーレイ (ミニマップのメイン情報)
    if (this.territory) {
      const dim = Math.ceil(WORLD_SIZE / CELL);
      const cellPx = cv.width / dim;
      for (let gy = 0; gy < dim; gy++) {
        for (let gx = 0; gx < dim; gx++) {
          const owner = this.territory[gy * dim + gx];
          if (owner === 255) continue;
          const fac = this.factions.get(owner);
          if (!fac) continue;
          ctx.fillStyle = fac.color + '70';
          ctx.fillRect(gx * cellPx, gy * cellPx, cellPx + 0.5, cellPx + 0.5);
        }
      }
    }

    // 拠点(ドット)
    for (const b of this.bases.values()) {
      const fac = this.factions.get(b.factionId);
      ctx.fillStyle = fac ? fac.color : '#999999';
      const x = b.x * scale, y = b.y * scale;
      const r = b.isHQ ? 4 : 2.4;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.lineWidth = 0.8; ctx.strokeStyle = '#0b1620'; ctx.stroke();
    }

    // ユニット(小ドット)
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      const fac = this.factions.get(u.factionId);
      ctx.fillStyle = fac ? fac.color : '#cccccc';
      ctx.fillRect(u.x * scale - 0.8, u.y * scale - 0.8, 1.6, 1.6);
    }

    // カメラ視野矩形
    const vb = this.camera.viewBounds();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(vb.x0 * scale, vb.y0 * scale, (vb.x1 - vb.x0) * scale, (vb.y1 - vb.y0) * scale);
  }

  /* ---------- セーブ / ロード (LocalStorage) ---------- */
  static saveKey(slot) { return `ecodom_save_${slot || 'manual'}`; }

  serialize() {
    return {
      v: 1, seed: this.seed, elapsed: this.elapsed, uid: __uid,
      nextEventAt: this.nextEventAt, eventTimer: this.eventTimer,
      activeEventKey: this.activeEvent ? this.activeEvent.def.key : null,
      activeEventRemain: this.activeEvent ? this.activeEvent.remain : 0,
      timeStopUntil: this.timeStopUntil, timeStopFactionId: this.timeStopFactionId,
      camera: { x: this.camera.x, y: this.camera.y, zoom: this.camera.zoom },
      eventLog: this.eventLog.slice(0, 40),
      factions: Array.from(this.factions.values()).map(f => ({
        id: f.id, name: f.name, color: f.color, kind: f.kind, difficulty: f.difficulty,
        morale: f.morale, score: f.score, leaderId: f.leaderId, alive: f.alive,
        totalPower: f.totalPower || 0, gold: f.gold || 0,
      })),
      bases: Array.from(this.bases.values()).map(b => ({
        id: b.id, factionId: b.factionId, x: b.x, y: b.y, isHQ: b.isHQ,
        originalFactionId: b.originalFactionId, tier: b.tier, population: b.population,
        captureProgress: b.captureProgress, capturingFactionId: b.capturingFactionId,
        growTimer: b.growTimer, radius: b.radius,
      })),
      units: Array.from(this.units.values()).filter(u => u.isAlive).map(u => ({
        id: u.id, factionId: u.factionId, x: u.x, y: u.y, level: u.level, isLeader: u.isLeader,
        power: u.power,
        maxHp: u.maxHp, hp: u.hp, attack: u.attack, defense: u.defense, speed: u.speed, sight: u.sight,
        hunger: u.hunger, age: u.age, exp: u.exp, state: u.state, order: u.order,
        targetX: u.targetX, targetY: u.targetY, targetUnitId: u.targetUnitId,
        targetBaseId: u.targetBaseId, targetFoodId: u.targetFoodId,
        breedCooldown: u.breedCooldown, flockId: u.flockId,
      })),
      food: Array.from(this.food.values()).map(f => ({ id: f.id, x: f.x, y: f.y, value: f.value })),
      mapItems: Array.from(this.mapItems.values()).map(i => ({ id: i.id, x: i.x, y: i.y, type: i.type })),
      fences: Array.from(this.fences.values()).map(f => ({ id: f.id, x: f.x, y: f.y, factionId: f.factionId, hp: f.hp })),
      combatWins: this.combatWins, combatLosses: this.combatLosses,
      territory: this.territory ? Array.from(this.territory) : null,
      flocks: Array.from(this.flocks.values()).map(fl => ({
        id: fl.id, factionId: fl.factionId, memberIds: Array.from(fl.memberIds), leaderId: fl.leaderId,
        order: fl.order, targetX: fl.targetX, targetY: fl.targetY,
        targetEnemyFactionId: fl.targetEnemyFactionId, targetBaseId: fl.targetBaseId,
        selected: fl.selected, playerLocked: fl.playerLocked,
      })),
    };
  }

  save(slot) {
    try {
      const data = this.serialize();
      localStorage.setItem(Game.saveKey(slot), JSON.stringify(data));
      return true;
    } catch (e) {
      console.error('セーブ失敗:', e);
      this.log('セーブに失敗した。');
      return false;
    }
  }

  static hasSave(slot) {
    try { return !!localStorage.getItem(Game.saveKey(slot)); } catch (e) { return false; }
  }

  load(slot) {
    let raw;
    try { raw = localStorage.getItem(Game.saveKey(slot)); } catch (e) { raw = null; }
    if (!raw) { this.log('セーブデータが見つからない。'); return false; }
    let data;
    try { data = JSON.parse(raw); } catch (e) { this.log('セーブデータの読み込みに失敗した。'); return false; }

    this.seed = data.seed;
    this.map = new WorldMap(this.seed);
    this.camera.map = this.map;
    this.elapsed = data.elapsed || 0;
    this.nextEventAt = data.nextEventAt != null ? data.nextEventAt : randRange(40, 70);
    this.eventTimer = data.eventTimer || 0;
    this.activeEvent = data.activeEventKey
      ? { def: RANDOM_EVENTS.find(e => e.key === data.activeEventKey), remain: data.activeEventRemain || 0 }
      : null;
    this.eventLog = data.eventLog || [];
    this.timeStopUntil = data.timeStopUntil || 0;
    this.timeStopFactionId = data.timeStopFactionId != null ? data.timeStopFactionId : -1;
    this.gameOver = null; this.paused = false;
    this.boxSelectRect = null; this.pendingCommand = null;
    this.selectedFlockIds = new Set();

    this.factions.clear();
    for (const fd of data.factions) {
      const f = new Faction(fd.id, fd.name, fd.color, fd.kind, fd.difficulty);
      f.morale = fd.morale; f.score = fd.score; f.leaderId = fd.leaderId;
      f.alive = fd.alive; f.totalPower = fd.totalPower || 0; f.gold = fd.gold || 0;
      this.factions.set(f.id, f);
    }

    this.bases.clear();
    for (const bd of data.bases) {
      const b = new Base(bd.id, bd.factionId, bd.x, bd.y, bd.isHQ);
      b.originalFactionId = bd.originalFactionId; b.tier = bd.tier; b.population = bd.population;
      b.captureProgress = bd.captureProgress; b.capturingFactionId = bd.capturingFactionId;
      b.growTimer = bd.growTimer; b.radius = bd.radius;
      this.bases.set(b.id, b);
      const fac = this.factions.get(b.factionId);
      if (fac) fac.baseIds.add(b.id);
    }

    this.units.clear();
    for (const ud of data.units) {
      const u = new Unit(ud.id, ud.factionId, ud.x, ud.y, { level: ud.level, isLeader: ud.isLeader });
      u.power = ud.power || u.power;
      u.maxHp = ud.maxHp; u.hp = ud.hp; u.attack = ud.attack; u.defense = ud.defense;
      u.speed = ud.speed; u.sight = ud.sight; u.hunger = ud.hunger; u.age = ud.age; u.exp = ud.exp;
      u.state = ud.state; u.order = ud.order; u.targetX = ud.targetX; u.targetY = ud.targetY;
      u.targetUnitId = ud.targetUnitId; u.targetBaseId = ud.targetBaseId; u.targetFoodId = ud.targetFoodId;
      u.breedCooldown = ud.breedCooldown; u.flockId = ud.flockId;
      this.units.set(u.id, u);
      const fac = this.factions.get(u.factionId);
      if (fac) fac.unitIds.add(u.id);
    }

    this.food.clear();
    for (const fd of data.food) {
      const f = new Food(fd.id, fd.x, fd.y); f.value = fd.value;
      this.food.set(f.id, f);
    }

    this.mapItems.clear();
    for (const id of (data.mapItems || [])) {
      const item = new MapItem(id.id, id.x, id.y, id.type);
      this.mapItems.set(item.id, item);
    }

    this.fences.clear();
    for (const fd of (data.fences || [])) {
      const f = new Fence(fd.id, fd.x, fd.y, fd.factionId);
      f.hp = fd.hp; this.fences.set(f.id, f);
    }
    this.combatWins = data.combatWins || 0;
    this.combatLosses = data.combatLosses || 0;
    if (data.territory) {
      this.territory = new Uint8Array(data.territory);
    } else {
      const dim = Math.ceil(WORLD_SIZE / CELL);
      this.territory = new Uint8Array(dim * dim).fill(255);
    }

    this.flocks.clear();
    for (const fld of data.flocks) {
      const fl = new Flock(fld.id, fld.factionId);
      fl.memberIds = new Set(fld.memberIds);
      fl.leaderId = fld.leaderId; fl.order = fld.order;
      fl.targetX = fld.targetX; fl.targetY = fld.targetY;
      fl.targetEnemyFactionId = fld.targetEnemyFactionId; fl.targetBaseId = fld.targetBaseId;
      fl.selected = false; fl.playerLocked = fld.playerLocked;
      this.flocks.set(fl.id, fl);
    }

    if (data.camera) { this.camera.x = data.camera.x; this.camera.y = data.camera.y; this.camera.zoom = data.camera.zoom; }
    this.timers = { hunger: 0, foodSpawn: 0, flockRebuild: 0, baseTick: 0, factionEval: 0, winCheck: 0, autosave: 0, combat: 0, gold: 0, merge: 0, itemSpawn: 0 };
    this.log('セーブデータをロードした。');
    if (this.ui && this.ui.onLog) this.ui.onLog(this.eventLog);
    return true;
  }
}

</script>
<script>
/* =========================================================
   UI結線・入力処理・メインループ
   ========================================================= */
(function () {
  const canvas = document.getElementById('mainCanvas');
  const minimapCanvas = document.getElementById('minimapCanvas');
  const ui = {
    onLog: (log) => renderLog(log),
    onGameOver: (result) => showGameOver(result),
  };
  let game = new Game(canvas, minimapCanvas, ui);
  window.__game = game; // デバッグ用

  /* ---------- キャンバスサイズ調整 ---------- */
  function resizeCanvases() {
    const stage = document.getElementById('stage');
    const w = stage.clientWidth || window.innerWidth || 360;
    const h = stage.clientHeight || window.innerHeight || 640;
    canvas.width = w; canvas.height = h;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';

    const mm = minimapCanvas;
    const mmSize = mm.clientWidth || 160;
    mm.width = mmSize; mm.height = mmSize;
  }

  /* ---------- 起動 / メニュー ---------- */
  const menuEl = document.getElementById('menu');
  const hudEl = document.getElementById('hud');
  const continueBtn = document.getElementById('btnContinue');
  if (!Game.hasSave('autosave') && !Game.hasSave('manual')) continueBtn.disabled = true;

  document.getElementById('btnStart').addEventListener('click', () => {
    const diff = document.getElementById('diffSelect').value;
    startNewGame(diff);
  });
  continueBtn.addEventListener('click', () => {
    loadGameFlow();
  });

  function startNewGame(diff) {
    menuEl.classList.add('hidden');
    hudEl.classList.remove('hidden');
    document.getElementById('gameOverPanel').classList.add('hidden');
    resizeCanvases();
    game.initNewGame(null, diff);
    lastTs = null;
    requestAnimationFrame(loop);
  }

  function loadGameFlow() {
    menuEl.classList.add('hidden');
    hudEl.classList.remove('hidden');
    document.getElementById('gameOverPanel').classList.add('hidden');
    resizeCanvases();
    const ok = game.load(Game.hasSave('manual') ? 'manual' : 'autosave');
    if (!ok) {
      hudEl.classList.add('hidden');
      menuEl.classList.remove('hidden');
      return;
    }
    lastTs = null;
    requestAnimationFrame(loop);
  }

  /* ---------- ゲームオーバー ---------- */
  function showGameOver(result) {
    const panel = document.getElementById('gameOverPanel');
    panel.classList.remove('hidden');
    document.getElementById('gameOverTitle').textContent = result === 'win' ? '勝利！' : '敗北…';
    document.getElementById('gameOverTitle').style.color = result === 'win' ? '#7fe0c2' : '#ff7a7a';
    // 成績発表
    const t = Math.floor(game.elapsed);
    document.getElementById('resTime').textContent = `${Math.floor(t/60)}分${t%60}秒`;
    document.getElementById('resTerritory').textContent = `${game.territoryPct}%`;
    document.getElementById('resWins').textContent = game.combatWins;
    document.getElementById('resLosses').textContent = game.combatLosses;
    const total = game.combatWins + game.combatLosses;
    const rate = total > 0 ? Math.round(game.combatWins / total * 100) : 0;
    document.getElementById('resWinRate').textContent = `${rate}%`;
    // 段位 (日数相当=経過秒/10 としてスコアに応じて段位判定)
    const score = (game.factions.get(0) || {}).score || 0;
    let dan = '無段';
    if (score >= 400) dan = '名人';
    else if (score >= 300) dan = '十段';
    else if (score >= 220) dan = '五段';
    else if (score >= 160) dan = '初段';
    else if (score >= 110) dan = '一級';
    else if (score >= 70)  dan = '五級';
    else if (score >= 30)  dan = '十級';
    else dan = '二十二級';
    document.getElementById('resDan').textContent = dan;
  }
  document.getElementById('btnBackToMenu').addEventListener('click', () => {
    document.getElementById('gameOverPanel').classList.add('hidden');
    hudEl.classList.add('hidden');
    menuEl.classList.remove('hidden');
  });

  /* ---------- メインループ ---------- */
  let lastTs = null;
  function loop(ts) {
    if (lastTs == null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    game.update(dt);
    game.render();
    game.drawMinimap();
    refreshHud();
    if (!game.gameOver) requestAnimationFrame(loop);
    else { game.render(); game.drawMinimap(); }
  }

  /* ---------- HUD更新 (テキスト系は間引き) ---------- */
  let hudTick = 0;
  function refreshHud() {
    hudTick++;
    if (hudTick % 10 !== 0) return; // 約6Hzで更新(負荷軽減)
    const player = game.factions.get(0);
    if (!player) return;
    document.getElementById('statPop').textContent = player.population;
    document.getElementById('statPower').textContent = Math.round(player.totalPower || 0);
    document.getElementById('statBases').textContent = player.baseIds.size;
    document.getElementById('statGold').textContent = Math.round(player.gold || 0) + 'G';
    document.getElementById('statTerritory').textContent = (game.territoryPct || 0) + '%';
    const ranking = game.getRanking();
    const rank = ranking.findIndex(r => r.id === 0) + 1;
    document.getElementById('statRank').textContent = `${rank} / ${ranking.length}`;

    const rankList = document.getElementById('rankList');
    rankList.innerHTML = ranking.map(r =>
      `<div class="rankRow" style="opacity:${r.alive ? 1 : 0.35}"><span class="dot" style="background:${r.color}"></span>${r.name} ${r.alive ? '' : '(壊滅)'} <b>${r.score}</b> <span style="color:#f2b134;font-size:10px">${r.gold}G</span></div>`
    ).join('');

    const info = game.getSelectedInfo();
    const panel = document.getElementById('selectedPanel');
    if (info) {
      panel.innerHTML = `選択中: ${info.count}体 / ${info.flockCount}群 ・ 総戦力 <b>${info.totalPow}</b> ・ 最強 <b>${info.maxPow}</b> ・ 命令: ${game.orderLabel(info.order)}`;
    } else {
      panel.innerHTML = '群れを選択してください(自勢力ユニットをタップ)';
    }

    if (game.activeEvent) {
      document.getElementById('eventBanner').textContent = `${game.activeEvent.def.label} — ${game.activeEvent.def.desc}`;
      document.getElementById('eventBanner').classList.remove('hidden');
    } else {
      document.getElementById('eventBanner').classList.add('hidden');
    }
  }

  function renderLog(log) {
    const el = document.getElementById('eventLog');
    el.innerHTML = log.slice(0, 12).map(l => `<div>${escapeHtml(l)}</div>`).join('');
  }
  function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

  /* ---------- 命令ボタン ---------- */
  document.querySelectorAll('[data-order]').forEach(btn => {
    btn.addEventListener('click', () => {
      const order = btn.getAttribute('data-order');
      if (order === 'move' || order === 'attack' || order === 'occupy') {
        game.beginTargetedOrder(order);
        setCursorHint(true);
      } else {
        game.issueImmediateOrder(order);
      }
    });
  });
  function setCursorHint(active) {
    canvas.classList.toggle('targeting', active);
  }

  document.getElementById('btnPause').addEventListener('click', () => {
    game.paused = !game.paused;
    document.getElementById('btnPause').textContent = game.paused ? '▶ 再開' : '⏸ 一時停止';
  });
  document.getElementById('btnSaveManual').addEventListener('click', () => {
    if (game.save('manual')) game.log('手動セーブ完了。');
  });
  document.getElementById('btnBoxSelectToggle').addEventListener('click', (e) => {
    boxSelectMode = !boxSelectMode;
    e.target.classList.toggle('active', boxSelectMode);
  });

  /* ---------- 入力処理 (タップ/長押し/ドラッグ/ピンチ/ホイール) ---------- */
  let boxSelectMode = false;
  const pointers = new Map(); // id -> {x,y}
  let dragMode = null; // 'pan' | 'box' | null
  let dragStart = null;
  let downInfo = null; // {x,y,t}
  let longPressTimer = null;
  let longPressFired = false;
  let pinchStartDist = null;
  let pinchStartZoom = null;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  canvas.addEventListener('pointerdown', (e) => {
    canvas.setPointerCapture(e.pointerId);
    const p = getPos(e);
    pointers.set(e.pointerId, p);
    longPressFired = false;

    if (pointers.size === 2) {
      const pts = Array.from(pointers.values());
      pinchStartDist = dist(pts[0].x, pts[0].y, pts[1].x, pts[1].y);
      pinchStartZoom = game.camera.zoom;
      dragMode = 'pinch';
      clearTimeout(longPressTimer);
      return;
    }

    downInfo = { x: p.x, y: p.y, t: performance.now() };
    if (boxSelectMode || e.button === 0 && e.shiftKey) {
      dragMode = 'box';
      game.boxSelectRect = { x0: p.x, y0: p.y, x1: p.x, y1: p.y };
    } else if (e.button === 2 || e.button === 1) {
      dragMode = 'pan';
      dragStart = { x: p.x, y: p.y };
    } else {
      dragMode = 'maybe'; // タップか左ドラッグ(カメラ移動)かは移動量で判定
      dragStart = { x: p.x, y: p.y };
      longPressTimer = setTimeout(() => {
        longPressFired = true;
        const w = game.camera.screenToWorld(p.x, p.y);
        const fl = game.pickFlockAt(w.x, w.y, Math.max(20, 24 / game.camera.zoom));
        if (fl) { game.toggleAdd(fl); flashSelectFeedback(p); }
      }, 480);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!pointers.has(e.pointerId)) return;
    const p = getPos(e);
    pointers.set(e.pointerId, p);

    if (dragMode === 'pinch' && pointers.size === 2) {
      const pts = Array.from(pointers.values());
      const d = dist(pts[0].x, pts[0].y, pts[1].x, pts[1].y);
      if (pinchStartDist > 1) {
        const factor = d / pinchStartDist;
        game.camera.setZoom(pinchStartZoom * factor);
      }
      return;
    }
    if (dragMode === 'box') {
      game.boxSelectRect.x1 = p.x; game.boxSelectRect.y1 = p.y;
      return;
    }
    if (dragMode === 'pan' || dragMode === 'maybe') {
      const dx = p.x - dragStart.x, dy = p.y - dragStart.y;
      if (dragMode === 'maybe' && Math.hypot(dx, dy) > 8) {
        dragMode = 'pan';
        clearTimeout(longPressTimer);
      }
      if (dragMode === 'pan') {
        game.camera.pan(-dx, -dy);
        dragStart = { x: p.x, y: p.y };
      }
    }
  });

  function endPointer(e) {
    const p = getPos(e);
    clearTimeout(longPressTimer);
    pointers.delete(e.pointerId);

    if (dragMode === 'box' && game.boxSelectRect) {
      const r = game.boxSelectRect;
      const w0 = game.camera.screenToWorld(Math.min(r.x0, r.x1), Math.min(r.y0, r.y1));
      const w1 = game.camera.screenToWorld(Math.max(r.x0, r.x1), Math.max(r.y0, r.y1));
      if (Math.hypot(r.x1 - r.x0, r.y1 - r.y0) > 6) game.boxSelect(w0.x, w0.y, w1.x, w1.y);
      game.boxSelectRect = null;
    } else if (dragMode === 'maybe' && !longPressFired && downInfo) {
      const moved = Math.hypot(p.x - downInfo.x, p.y - downInfo.y);
      const heldMs = performance.now() - downInfo.t;
      if (moved < 8 && heldMs < 480) handleTap(p);
    }

    if (pointers.size === 0) { dragMode = null; pinchStartDist = null; }
    else if (pointers.size === 1) { dragMode = 'pan'; dragStart = Array.from(pointers.values())[0]; }
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('contextmenu', (e) => e.preventDefault());

  function handleTap(p) {
    const w = game.camera.screenToWorld(p.x, p.y);
    if (game.pendingCommand) {
      game.resolveTargetedTap(w.x, w.y);
      setCursorHint(false);
      return;
    }
    const fl = game.pickFlockAt(w.x, w.y, Math.max(20, 24 / game.camera.zoom));
    if (fl) { game.selectSingle(fl); flashSelectFeedback(p); }
    else game.clearSelection();
  }

  function flashSelectFeedback(p) {
    // タップ位置に短い視覚フィードバック用のCSSクラス付き要素を出す(簡易)
    const dotEl = document.createElement('div');
    dotEl.className = 'tapFx';
    dotEl.style.left = p.x + 'px'; dotEl.style.top = p.y + 'px';
    document.getElementById('stage').appendChild(dotEl);
    setTimeout(() => dotEl.remove(), 350);
  }

  /* ---------- マウスホイールズーム / 右ドラッグパン(PC) ---------- */
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const p = getPos(e);
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    game.camera.zoomAt(factor, p.x, p.y);
  }, { passive: false });

  /* ---------- キーボード(PC: WASD / 矢印でパン) ---------- */
  const keys = new Set();
  window.addEventListener('keydown', (e) => keys.add(e.key.toLowerCase()));
  window.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
  setInterval(() => {
    if (!game.map || hudEl.classList.contains('hidden')) return;
    const panSpeed = 14 / game.camera.zoom;
    let dx = 0, dy = 0;
    if (keys.has('arrowleft') || keys.has('a')) dx -= panSpeed;
    if (keys.has('arrowright') || keys.has('d')) dx += panSpeed;
    if (keys.has('arrowup') || keys.has('w')) dy -= panSpeed;
    if (keys.has('arrowdown') || keys.has('s')) dy += panSpeed;
    if (dx || dy) game.camera.pan(dx * game.camera.zoom, dy * game.camera.zoom);
  }, 16);

  window.addEventListener('resize', resizeCanvases);
  resizeCanvases();
})();

</script>
