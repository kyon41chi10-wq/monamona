<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Ecosystem Dominion — 生態系統率記</title>
<style>
:root{
  --void:#060b10;
  --panel:rgba(10,20,28,0.82);
  --panel-edge:rgba(242,177,52,0.35);
  --amber:#f2b134;
  --cyan:#5ad1c9;
  --text:#eaf2f8;
  --dim:#7e93a3;
  --danger:#ff5d5d;
  --success:#7fe0c2;
  --mono: 'SF Mono', 'Consolas', 'Courier New', monospace;
  --sans: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;background:var(--void);color:var(--text);font-family:var(--sans);overflow:hidden;user-select:none;}
.hidden{display:none !important;}

/* ---------- 汎用パネル(ブラケット枠) ---------- */
.panel{
  position:relative;
  background:var(--panel);
  border:1px solid var(--panel-edge);
  border-radius:4px;
  backdrop-filter:blur(6px);
  padding:10px 12px;
}
.panel::before,.panel::after,.panel .bL,.panel .bR{
  content:'';position:absolute;width:10px;height:10px;
  border-color:var(--amber);pointer-events:none;
}
.panel::before{top:-1px;left:-1px;border-top:2px solid var(--amber);border-left:2px solid var(--amber);}
.panel::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--amber);border-right:2px solid var(--amber);}

/* ---------- メニュー画面 ---------- */
#menu{
  position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 30%, #0d1a24 0%, #060b10 70%);
  z-index:50; gap:22px; padding:20px;
}
#menu h1{
  font-size:clamp(22px,5vw,40px); letter-spacing:.08em; margin:0; text-align:center;
  color:var(--text); text-shadow:0 0 18px rgba(242,177,52,0.35);
  font-weight:800;
}
#menu .sub{color:var(--dim); font-size:13px; letter-spacing:.12em; margin-top:-14px; font-family:var(--mono);}
#menu .menuCard{display:flex; flex-direction:column; gap:14px; width:min(360px,86vw);}
#menu label{font-size:12px; color:var(--dim); letter-spacing:.08em; font-family:var(--mono);}
select, button{
  font-family:var(--sans); font-size:15px; color:var(--text);
  background:rgba(20,32,42,0.9); border:1px solid var(--panel-edge); border-radius:4px;
  padding:11px 14px; cursor:pointer;
}
select:focus, button:focus{outline:2px solid var(--cyan); outline-offset:1px;}
.btnPrimary{background:linear-gradient(180deg, rgba(242,177,52,0.95), rgba(200,140,30,0.95)); color:#1a1208; font-weight:700; border:none; letter-spacing:.04em;}
.btnPrimary:active{transform:translateY(1px);}
.btnGhost{background:transparent; border:1px solid var(--panel-edge); color:var(--dim);}
.btnGhost:disabled{opacity:.35; cursor:not-allowed;}

/* ---------- HUD全体 ---------- */
#hud{position:fixed; inset:0;}
#stage{position:absolute; inset:0; overflow:hidden;}
#mainCanvas{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; cursor:crosshair;}
#mainCanvas.targeting{cursor:cell;}

/* ---------- 左上ステータス ---------- */
#topLeft{position:absolute; top:10px; left:10px; min-width:148px; font-family:var(--mono); font-size:12px; z-index:10;}
#topLeft .row{display:flex; justify-content:space-between; gap:10px; padding:2px 0; color:var(--dim);}
#topLeft .row b{color:var(--text); font-size:13px;}
#topLeft h2{margin:0 0 6px; font-size:11px; letter-spacing:.1em; color:var(--amber); font-family:var(--sans); font-weight:700;}

/* ---------- 順位パネル ---------- */
#rankPanel{position:absolute; top:96px; left:10px; width:178px; font-size:11px; z-index:10;}
#rankPanel h2{margin:0 0 6px; font-size:11px; letter-spacing:.1em; color:var(--amber); font-family:var(--sans); font-weight:700;}
.rankRow{display:flex; align-items:center; gap:6px; padding:2px 0; font-family:var(--mono); color:var(--text);}
.rankRow .dot{width:8px; height:8px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 4px currentColor;}
.rankRow b{margin-left:auto;}

/* ---------- ミニマップ ---------- */
#minimapWrap{position:absolute; top:10px; right:10px; z-index:10;}
#minimapCanvas{display:block; width:148px; height:148px; border-radius:3px;}

/* ---------- イベント横断バナー ---------- */
#eventBanner{
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  font-family:var(--mono); font-size:12px; padding:6px 14px; z-index:10;
  color:var(--amber); text-align:center; white-space:nowrap;
}

/* ---------- イベントログ ---------- */
#logPanel{position:absolute; left:10px; bottom:128px; width:240px; max-height:120px; overflow:hidden; z-index:10; font-size:11px;}
#logPanel h2{margin:0 0 6px; font-size:11px; letter-spacing:.1em; color:var(--cyan); font-family:var(--sans); font-weight:700;}
#eventLog{font-family:var(--mono); color:var(--dim); line-height:1.5; max-height:84px; overflow:hidden;}
#eventLog div:first-child{color:var(--text);}

/* ---------- 下部コマンドバー ---------- */
#bottomBar{position:absolute; left:10px; right:10px; bottom:10px; z-index:10; display:flex; flex-direction:column; gap:8px;}
#selectedPanel{font-size:12px; font-family:var(--mono); color:var(--text); padding:8px 12px;}
#orderRow{display:flex; gap:6px; overflow-x:auto; padding:2px; -webkit-overflow-scrolling:touch;}
#orderRow button{
  flex:0 0 auto; font-size:13px; padding:10px 14px; min-width:64px;
  background:rgba(20,32,42,0.92); border:1px solid var(--panel-edge); color:var(--text);
  border-radius:5px; font-weight:600;
}
#orderRow button:active{background:rgba(242,177,52,0.25);}
#orderRow button.active{background:rgba(90,209,201,0.22); border-color:var(--cyan); color:var(--cyan);}
#sysRow{display:flex; gap:6px; justify-content:flex-end;}
#sysRow button{font-size:12px; padding:8px 12px; background:rgba(8,14,20,0.85); border:1px solid var(--panel-edge); color:var(--dim);}

/* ---------- タップフィードバック ---------- */
.tapFx{
  position:absolute; width:30px; height:30px; margin:-15px 0 0 -15px;
  border:2px solid var(--cyan); border-radius:50%; pointer-events:none; z-index:30;
  animation:tapFxAnim .35s ease-out forwards;
}
@keyframes tapFxAnim{ from{opacity:1; transform:scale(.3);} to{opacity:0; transform:scale(1.6);} }

/* ---------- ゲームオーバー ---------- */
#gameOverPanel{
  position:fixed; inset:0; z-index:60; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  background:rgba(4,8,12,0.86); backdrop-filter:blur(3px);
}
#gameOverTitle{font-size:clamp(28px,7vw,52px); font-weight:800; letter-spacing:.08em; margin:0;}

/* ---------- スマホ向け調整 ---------- */
@media (max-width:560px){
  #rankPanel{display:none;}
  #logPanel{width:54vw;}
  #minimapCanvas{width:104px; height:104px;}
  #topLeft{font-size:11px;}
}
</style>
</head>
<body>

<!-- ================= メニュー ================= -->
<div id="menu">
  <h1>ECOSYSTEM DOMINION</h1>
  <div class="sub">生態系統率記 — 自律する群れに介入し、勢力を統べよ</div>
  <div class="menuCard panel">
    <label for="diffSelect">CPU難易度</label>
    <select id="diffSelect">
      <option value="easy">Easy — のどかな勢力争い</option>
      <option value="normal" selected>Normal — 標準的な抗争</option>
      <option value="hard">Hard — 苛烈な侵略</option>
      <option value="insane">Insane — 殲滅戦</option>

    <button class="btnPrimary" id="btnStart">新規シミュレーション開始</button>
    <button class="btnGhost" id="btnContinue">続きから (オートセーブ/手動セーブ)</button>
  </div>
</div>

<!-- ================= HUD ================= -->
<div id="hud" class="hidden">
  <div id="stage">
    <canvas id="mainCanvas"></canvas>

    <div id="topLeft" class="panel">
      <h2>勢力ステータス</h2>
      <div class="row">人口 <b id="statPop">0</b></div>
      <div class="row">総戦力 <b id="statPower">0</b></div>
      <div class="row">拠点数 <b id="statBases">0</b></div>
      <div class="row">資金 <b id="statGold" style="color:#f2b134">0G</b></div>
      <div class="row">占領率 <b id="statTerritory">0%</b></div>
      <div class="row">順位 <b id="statRank">-</b></div>
    </div>

    <div id="rankPanel" class="panel">
      <h2>勢力順位</h2>
      <div id="rankList"></div>
    </div>

    <div id="minimapWrap" class="panel">
      <canvas id="minimapCanvas"></canvas>
    </div>

    <div id="eventBanner" class="panel hidden"></div>

    <div id="logPanel" class="panel">
      <h2>戦況ログ</h2>
      <div id="eventLog"></div>
    </div>

    <div id="bottomBar">
      <div id="selectedPanel" class="panel">群れを選択してください(自勢力ユニットをタップ)</div>
      <div id="orderRow" class="panel">
        <button data-order="move">移動</button>
        <button data-order="attack">攻撃</button>
        <button data-order="occupy">占領</button>
        <button data-order="defend">防衛</button>
        <button data-order="build">柵建設</button>
        <button data-order="explore">探索</button>
        <button data-order="retreat">撤退</button>
        <button id="btnBoxSelectToggle" title="範囲選択モード">⬚ 範囲選択</button>
      </div>
      <div id="sysRow">
        <button id="btnSaveManual">💾 セーブ</button>
        <button id="btnPause">⏸ 一時停止</button>
      </div>
    </div>
  </div>
</div>

<!-- ================= 成績発表 ================= -->
<div id="gameOverPanel" class="hidden">
  <h1 id="gameOverTitle">勝利！</h1>
  <div id="resultsCard" class="panel" style="width:min(380px,88vw);text-align:left">
    <h2 style="color:var(--amber);margin:0 0 10px">■ 成績発表</h2>
    <div class="row">経過時間 <b id="resTime">-</b></div>
    <div class="row">占領率 <b id="resTerritory">-</b></div>
    <div class="row">撃破数 <b id="resWins">-</b></div>
    <div class="row">喪失数 <b id="resLosses">-</b></div>
    <div class="row">戦闘勝率 <b id="resWinRate">-</b></div>
    <div class="row" style="margin-top:8px;font-size:20px;color:var(--amber)">段位 <b id="resDan">-</b></div>
  </div>
  <button class="btnPrimary" id="btnBackToMenu">メニューに戻る</button>
</div>

<script>
/* =========================================================
   生態系シミュレーションRTS — Ecosystem Dominion
   単一HTMLで動作するVanilla JS実装
   ========================================================= */

/* ---------------- 定数 ---------------- */
const WORLD_SIZE = 1200;
const CELL = 50;                       // 地形セルサイズ
const GRID_DIM = Math.ceil(WORLD_SIZE / CELL); // 60
const GRID_CELL = 150;                 // 空間分割グリッド(索敵用)セルサイズ
const GRID_DIM2 = Math.ceil(WORLD_SIZE / GRID_CELL);

const TERRAIN = {
  PLAIN:    { id: 0, name: '平地',   speed: 1.0,  color: '#7a9b57' },
  FOREST:   { id: 1, name: '森',     speed: 0.8,  color: '#3f6b3a' },
  MOUNTAIN: { id: 2, name: '山',     speed: 0.5,  color: '#8c8378' },
  SWAMP:    { id: 3, name: '沼地',   speed: 0.6,  color: '#5c5a35' },
  WATER:    { id: 4, name: '水域',   speed: 0,    color: '#2f5f86' },
};
const TERRAIN_LIST = [TERRAIN.PLAIN, TERRAIN.FOREST, TERRAIN.MOUNTAIN, TERRAIN.SWAMP, TERRAIN.WATER];
const TERRAIN_HEIGHT = { 0: 1, 1: 2, 2: 3, 3: 0, 4: 0 }; // 地形id -> 高さレベル(0-3): 平地1/森2/山3/沼0/水0
const MAX_HEIGHT = 3;

const UNIT_STATE = {
  IDLE: 'idle', WANDER: 'wander', SEEK_FOOD: 'seek_food', MOVE: 'move',
  FOLLOW: 'follow', DEFEND: 'defend', ATTACK: 'attack', RETREAT: 'retreat',
  OCCUPY: 'occupy', BREED: 'breed', EXPLORE: 'explore',
};

const FLOCK_ORDER = {
  MOVE: 'move', DEFEND: 'defend', EXPLORE: 'explore', OCCUPY: 'occupy',
  ATTACK: 'attack', RETREAT: 'retreat', NONE: 'none', BUILD: 'build',
};

const BASE_TIERS = [
  { name: '小集落', popCap: 20,  defense: 10 },
  { name: '村',     popCap: 45,  defense: 25 },
  { name: '町',     popCap: 80,  defense: 45 },
  { name: '都市',   popCap: 140, defense: 70 },
  { name: '要塞',   popCap: 220, defense: 110 },
];
const HQ_TIER = { name: '本拠地', popCap: 400, defense: 180 };

const DIFFICULTY = {
  easy:   { thinkInterval: 1.0,  breedMult: 0.8 },
  normal: { thinkInterval: 0.5,  breedMult: 1.0 },
  hard:   { thinkInterval: 0.25, breedMult: 1.2 },
  insane: { thinkInterval: 0.1,  breedMult: 1.5 },
};

/* ---------------- 汎用ユーティリティ ---------------- */
function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
function darkenHex(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16), g = ((n >> 8) & 0xff), b = (n & 0xff);
  r = Math.round(r * (1 - pct)); g = Math.round(g * (1 - pct)); b = Math.round(b * (1 - pct));
  return `rgb(${clamp(r,0,255)},${clamp(g,0,255)},${clamp(b,0,255)})`;
}
function shadeRgbAmt(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) + amt, g = ((n >> 8) & 0xff) + amt, b = (n & 0xff) + amt;
  return `rgb(${clamp(r,0,255)},${clamp(g,0,255)},${clamp(b,0,255)})`;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function dist2(x1, y1, x2, y2) { const dx = x1 - x2, dy = y1 - y2; return dx * dx + dy * dy; }
function dist(x1, y1, x2, y2) { return Math.sqrt(dist2(x1, y1, x2, y2)); }
function randRange(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(randRange(a, b + 1)); }
function choice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
let __uid = 1;
function nextId() { return __uid++; }

/* 値ノイズ(疑似パーリン) — 外部ライブラリ無しで地形生成に使用 */
class ValueNoise {
  constructor(seed, gridW, gridH) {
    this.gridW = gridW; this.gridH = gridH;
    this.values = new Float32Array(gridW * gridH);
    let s = seed;
    const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
    for (let i = 0; i < this.values.length; i++) this.values[i] = rnd();
  }
  _at(x, y) {
    x = ((x % this.gridW) + this.gridW) % this.gridW;
    y = ((y % this.gridH) + this.gridH) % this.gridH;
    return this.values[y * this.gridW + x];
  }
  sample(fx, fy) {
    const x0 = Math.floor(fx), y0 = Math.floor(fy);
    const tx = fx - x0, ty = fy - y0;
    const v00 = this._at(x0, y0), v10 = this._at(x0 + 1, y0);
    const v01 = this._at(x0, y0 + 1), v11 = this._at(x0 + 1, y0 + 1);
    const sx = tx * tx * (3 - 2 * tx), sy = ty * ty * (3 - 2 * ty);
    const a = lerp(v00, v10, sx), b = lerp(v01, v11, sx);
    return lerp(a, b, sy);
  }
}

/* ---------------- 空間分割グリッド（索敵・近傍探索の高速化） ---------------- */
class SpatialGrid {
  constructor(cellSize, worldSize) {
    this.cellSize = cellSize;
    this.dim = Math.ceil(worldSize / cellSize);
    this.buckets = new Map();
  }
  _key(cx, cy) { return cx * 100000 + cy; }
  _cellOf(x, y) { return [Math.floor(x / this.cellSize), Math.floor(y / this.cellSize)]; }
  clear() { this.buckets.clear(); }
  insert(entity) {
    const [cx, cy] = this._cellOf(entity.x, entity.y);
    const k = this._key(cx, cy);
    let b = this.buckets.get(k);
    if (!b) { b = []; this.buckets.set(k, b); }
    b.push(entity);
  }
  rebuild(entities) {
    this.clear();
    for (const e of entities) this.insert(e);
  }
  /* 半径radius以内の候補(セル単位の粗い絞り込み)を返す */
  queryRadius(x, y, radius) {
    const result = [];
    const cr = Math.ceil(radius / this.cellSize);
    const [cx, cy] = this._cellOf(x, y);
    for (let ix = cx - cr; ix <= cx + cr; ix++) {
      for (let iy = cy - cr; iy <= cy + cr; iy++) {
        const b = this.buckets.get(this._key(ix, iy));
        if (b) for (const e of b) result.push(e);
      }
    }
    return result;
  }
}

/* ---------------- 地形マップ ---------------- */
class WorldMap {
  constructor(seed) {
    this.dim = GRID_DIM; // 60x60
    this.tiles = new Uint8Array(this.dim * this.dim);
    this.heights = new Uint8Array(this.dim * this.dim);
    this.noiseA = new ValueNoise(seed, 10, 10);
    this.noiseB = new ValueNoise(seed + 777, 24, 24);
    this.foodSpots = [];
    this._generate();
    this.buildOffscreen();
  }
  buildOffscreen() {
    const px = 10; // 1タイル=10px の縮小キャンバスに事前描画
    const size = this.dim * px;
    const cnv = document.createElement('canvas');
    cnv.width = size; cnv.height = size;
    const c = cnv.getContext('2d');
    for (let gy = 0; gy < this.dim; gy++) {
      for (let gx = 0; gx < this.dim; gx++) {
        const t = TERRAIN_LIST.find(tt => tt.id === this.tiles[gy * this.dim + gx]) || TERRAIN.PLAIN;
        const jitter = ((gx * 13 + gy * 7) % 9) - 4;
        c.fillStyle = this._shade(t.color, jitter);
        c.fillRect(gx * px, gy * px, px, px);
      }
    }
    this.offscreen = cnv;
    this.offscreenPxPerTile = px;
  }
  _shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amt, g = ((n >> 8) & 0xff) + amt, b = (n & 0xff) + amt;
    r = clamp(r, 0, 255); g = clamp(g, 0, 255); b = clamp(b, 0, 255);
    return `rgb(${r},${g},${b})`;
  }
  _generate() {
    const d = this.dim;
    for (let gy = 0; gy < d; gy++) {
      for (let gx = 0; gx < d; gx++) {
        const fx = gx / d, fy = gy / d;
        const n1 = this.noiseA.sample(fx * 10, fy * 10);
        const n2 = this.noiseB.sample(fx * 24, fy * 24);
        const h = n1 * 0.65 + n2 * 0.35;
        let t;
        if (h < 0.16) t = TERRAIN.WATER.id;
        else if (h < 0.24) t = TERRAIN.SWAMP.id;
        else if (h < 0.62) t = TERRAIN.PLAIN.id;
        else if (h < 0.80) t = TERRAIN.FOREST.id;
        else t = TERRAIN.MOUNTAIN.id;
        this.tiles[gy * d + gx] = t;
        this.heights[gy * d + gx] = TERRAIN_HEIGHT[t];
      }
    }
    // 外周は水域にしてマップを閉じる（軽い演出）
    for (let gx = 0; gx < d; gx++) {
      this.tiles[gx] = TERRAIN.WATER.id; this.heights[gx] = 0;
      this.tiles[(d - 1) * d + gx] = TERRAIN.WATER.id; this.heights[(d - 1) * d + gx] = 0;
    }
    for (let gy = 0; gy < d; gy++) {
      this.tiles[gy * d] = TERRAIN.WATER.id; this.heights[gy * d] = 0;
      this.tiles[gy * d + (d - 1)] = TERRAIN.WATER.id; this.heights[gy * d + (d - 1)] = 0;
    }
  }
  heightAtWorld(x, y) {
    const gx = clamp(Math.floor(x / CELL), 0, this.dim - 1);
    const gy = clamp(Math.floor(y / CELL), 0, this.dim - 1);
    return this.heights[gy * this.dim + gx];
  }
  heightAtTile(gx, gy) {
    if (gx < 0 || gy < 0 || gx >= this.dim || gy >= this.dim) return 0;
    return this.heights[gy * this.dim + gx];
  }
  tileAtWorld(x, y) {
    const gx = clamp(Math.floor(x / CELL), 0, this.dim - 1);
    const gy = clamp(Math.floor(y / CELL), 0, this.dim - 1);
    return this.tiles[gy * this.dim + gx];
  }
  terrainAtWorld(x, y) {
    return TERRAIN_LIST.find(t => t.id === this.tileAtWorld(x, y)) || TERRAIN.PLAIN;
  }
  speedFactorAt(x, y) { return this.terrainAtWorld(x, y).speed; }
  isWater(x, y) { return this.tileAtWorld(x, y) === TERRAIN.WATER.id; }
  /* 安全な(陸地)出現座標を探す */
  findLandSpawn(cx, cy, radius) {
    for (let i = 0; i < 60; i++) {
      const ang = Math.random() * Math.PI * 2;
      const r = Math.random() * radius;
      const x = clamp(cx + Math.cos(ang) * r, 60, WORLD_SIZE - 60);
      const y = clamp(cy + Math.sin(ang) * r, 60, WORLD_SIZE - 60);
      if (!this.isWater(x, y)) return { x, y };
    }
    return { x: cx, y: cy };
  }
}

/* ---------------- カメラ ---------------- */
/* ---------------- アイソメトリック投影定数 ---------------- */
const ISO_TILE_W = 48;            // 基準タイル幅(px, zoom=1)
const ISO_TILE_H = 24;            // 基準タイル高さ(px, zoom=1) — 2:1比率
const ISO_KX = ISO_TILE_W / (2 * CELL);
const ISO_KY = ISO_TILE_H / (2 * CELL);
const ISO_HEIGHT_STEP = 20;       // 高さ1レベルあたりの上昇px(zoom=1)

class Camera {
  constructor(canvas) {
    this.canvas = canvas;
    this.x = WORLD_SIZE / 2;
    this.y = WORLD_SIZE / 2;
    this.zoom = 1.0;
    this.minZoom = 0.35;
    this.maxZoom = 4.0;
    this.map = null; // WorldMap参照(高さ判定用、Gameが設定する)
  }
  /* ワールド座標(+高さ)→画面座標。hを省略すると地形の高さを自動取得 */
  worldToScreen(wx, wy, h) {
    if (h == null) h = this.map ? this.map.heightAtWorld(wx, wy) : 0;
    const isoX = (wx - wy) * ISO_KX;
    const isoY = (wx + wy) * ISO_KY - h * ISO_HEIGHT_STEP;
    const camIsoX = (this.x - this.y) * ISO_KX;
    const camIsoY = (this.x + this.y) * ISO_KY;
    return {
      x: (isoX - camIsoX) * this.zoom + this.canvas.width / 2,
      y: (isoY - camIsoY) * this.zoom + this.canvas.height / 2,
    };
  }
  /* 画面座標→ワールド座標。高さは候補を上から順に試し、地形と整合する高さを採用 */
  _screenToWorldAtHeight(sx, sy, h) {
    const camIsoX = (this.x - this.y) * ISO_KX;
    const camIsoY = (this.x + this.y) * ISO_KY;
    const isoX = (sx - this.canvas.width / 2) / this.zoom + camIsoX;
    const isoYraw = (sy - this.canvas.height / 2) / this.zoom + camIsoY;
    const A = isoX / ISO_KX;                          // = wx - wy
    const B = (isoYraw + h * ISO_HEIGHT_STEP) / ISO_KY; // = wx + wy
    return { x: (A + B) / 2, y: (B - A) / 2 };
  }
  screenToWorld(sx, sy) {
    if (!this.map) {
      const w0 = this._screenToWorldAtHeight(sx, sy, 0);
      return { x: clamp(w0.x, 0, WORLD_SIZE), y: clamp(w0.y, 0, WORLD_SIZE) };
    }
    for (let h = MAX_HEIGHT; h >= 0; h--) {
      const w = this._screenToWorldAtHeight(sx, sy, h);
      const cx = clamp(w.x, 0, WORLD_SIZE), cy = clamp(w.y, 0, WORLD_SIZE);
      if (this.map.heightAtWorld(cx, cy) === h) return { x: cx, y: cy };
    }
    const w0 = this._screenToWorldAtHeight(sx, sy, 0);
    return { x: clamp(w0.x, 0, WORLD_SIZE), y: clamp(w0.y, 0, WORLD_SIZE) };
  }
  /* 描画カリング用：現在の画面に写るワールド範囲を高さ0〜最大の両方で見積もり結合する */
  viewBoundsWorld(margin = 0) {
    const corners = [[0, 0], [this.canvas.width, 0], [0, this.canvas.height], [this.canvas.width, this.canvas.height]];
    let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
    for (const h of [0, MAX_HEIGHT]) {
      for (const [sx, sy] of corners) {
        const w = this._screenToWorldAtHeight(sx, sy, h);
        if (w.x < x0) x0 = w.x; if (w.x > x1) x1 = w.x;
        if (w.y < y0) y0 = w.y; if (w.y > y1) y1 = w.y;
      }
    }
    return { x0: x0 - margin, x1: x1 + margin, y0: y0 - margin, y1: y1 + margin };
  }
  pan(dx, dy) {
    this.x = clamp(this.x + dx / this.zoom, 0, WORLD_SIZE);
    this.y = clamp(this.y + dy / this.zoom, 0, WORLD_SIZE);
  }
  zoomAt(factor, sx, sy) {
    const before = this.screenToWorld(sx, sy);
    this.zoom = clamp(this.zoom * factor, this.minZoom, this.maxZoom);
    const after = this.screenToWorld(sx, sy);
    this.x = clamp(this.x + (before.x - after.x), 0, WORLD_SIZE);
    this.y = clamp(this.y + (before.y - after.y), 0, WORLD_SIZE);
  }
  setZoom(z) { this.zoom = clamp(z, this.minZoom, this.maxZoom); }
  /* ミニマップの視野矩形表示用の簡易近似(高さ無視) */
  viewBounds(margin = 0) {
    const halfW = this.canvas.width / 2 / this.zoom + margin;
    const halfH = this.canvas.height / 2 / this.zoom + margin;
    return { x0: this.x - halfW, x1: this.x + halfW, y0: this.y - halfH, y1: this.y + halfH };
  }
  isOnScreen(x, y, margin = 50) {
    const b = this.viewBounds(margin);
    return x >= b.x0 && x <= b.x1 && y >= b.y0 && y <= b.y1;
  }
}

/* ---------------- 勢力 ---------------- */
class Faction {
  constructor(id, name, color, kind, difficulty) {
    this.id = id; this.name = name; this.color = color;
    this.kind = kind; this.difficulty = difficulty || 'normal';
    this.morale = 100; this.score = 0; this.leaderId = null;
    this.baseIds = new Set(); this.unitIds = new Set();
    this.alive = true; this.thinkTimer = Math.random(); this.foodReserve = 0;
    this.gold = 800;          // 資金
    this.totalPower = 0;
    this.territoryMult = 1.0; // 領土補正(領土が広いほど高い)
    this.territoryCells = 0;  // 所有タイル数
  }
  get population() { return this.unitIds.size; }
  moraleAttackMult() { return clamp(this.morale / 100, 0.4, 1.3); }
  moraleBreedMult()  { return clamp(this.morale / 100, 0.3, 1.2); }
  moraleRetreatBias(){ return clamp(1.4 - this.morale / 100, 0, 1.4); }
  applyMorale(delta) { this.morale = clamp(this.morale + delta, 0, 150); }
  goldIncome(bases) {
    let inc = 0;
    for (const bid of this.baseIds) {
      const b = bases.get(bid); if (!b) continue;
      inc += b.isHQ ? 8 : (b.tier + 1) * 6;
    }
    return inc;
  }
}

/* ---------------- 拠点 ---------------- */
class Base {
  constructor(id, factionId, x, y, isHQ) {
    this.id = id;
    this.factionId = factionId;
    this.x = x; this.y = y;
    this.isHQ = !!isHQ;
    this.originalFactionId = factionId;
    this.tier = isHQ ? -1 : 0;    // -1 = HQ専用ティア
    this.population = isHQ ? 30 : randInt(4, 8);
    this.captureProgress = 0;     // 0-100, 占領中の所属候補
    this.capturingFactionId = null;
    this.growTimer = 0;
    this.radius = isHQ ? 70 : 40 + this.tier * 8;
  }
  tierInfo() { return this.isHQ ? HQ_TIER : BASE_TIERS[this.tier]; }
  get defense() { return this.tierInfo().defense; }
  get popCap() { return this.tierInfo().popCap; }
  get name() { return this.tierInfo().name; }
  growPopulation(dt, factionRef) {
    this.growTimer += dt;
    if (this.growTimer >= 5) {
      this.growTimer = 0;
      if (this.population < this.popCap) {
        const moraleMult = factionRef ? factionRef.moraleBreedMult() : 1;
        if (Math.random() < moraleMult) this.population += 1;
      }
      if (!this.isHQ && this.population >= this.popCap * 0.6 && this.tier < BASE_TIERS.length - 1) {
        this.tier += 1;
        this.radius = 40 + this.tier * 8;
      }
    }
  }
}

/* ---------------- ユニット ---------------- */
const BASE_UNIT_SPEED = 30;     // world units / sec (平地基準)
const BASE_SIGHT = 220;
const MAX_LEVEL = 10;
const SOFT_POP_CAP = 260;       // 勢力ごとの自然増殖ソフトキャップ（パフォーマンス保護）

class Unit {
  constructor(id, factionId, x, y, opts = {}) {
    this.id = id;
    this.factionId = factionId;
    this.x = x; this.y = y;
    this.level = opts.level || 1;
    this.isLeader = !!opts.isLeader;
    // ===== モナークモナーク式 戦力数値 =====
    // この数字が大きいキャラが小さいキャラを吸収する
    const base = this.isLeader ? 40 : 15;
    this.power = Math.round(base * this.level + randInt(0, 5));
    // 以下は内部的に維持(移動・空腹などで使用)
    this.maxHp = this.power * 2;   // HPはpowerに連動
    this.hp = this.maxHp;
    this.attack = this.power * 0.6;
    this.defense = this.power * 0.3;
    this.speed = BASE_UNIT_SPEED * (1 + 0.05 * (this.level - 1));
    this.sight = BASE_SIGHT + (this.isLeader ? 80 : 0);
    this.hunger = randRange(0, 20);
    this.age = 0;
    this.exp = 0;
    this.state = UNIT_STATE.WANDER;
    this.order = FLOCK_ORDER.NONE;
    this.targetX = null; this.targetY = null;
    this.targetUnitId = null;
    this.targetBaseId = null;
    this.targetFoodId = null;
    this.breedCooldown = randRange(0, 8);
    this.attackCooldown = 0;
    this.thinkCooldown = randRange(0, 0.5);
    this.flockId = null;
    this.dead = false;
    this.wanderAngle = Math.random() * Math.PI * 2;
    this.buffMult = { atk: 1, def: 1, spd: 1 };
  }
  get isAlive() { return !this.dead && this.hp > 0; }
  /* 実効戦力: 領土補正・士気補正を外部から掛けて比較に使う */
  effPower(terrMult, moraleMult) {
    return Math.round(this.power * (terrMult || 1) * (moraleMult || 1) * this.buffMult.atk);
  }
  /* 後方互換のためeffAttack/effDefenseも維持 */
  effAttack()  { return this.attack  * this.buffMult.atk; }
  effDefense() { return this.defense * this.buffMult.def; }
  effSpeed()   { return this.speed   * this.buffMult.spd; }
  expToNext()  { return 40 + this.level * 35; }
  gainExp(amount, game) {
    if (this.level >= MAX_LEVEL) return;
    this.exp += amount;
    while (this.exp >= this.expToNext() && this.level < MAX_LEVEL) {
      this.exp -= this.expToNext();
      this.levelUp();
    }
  }
  levelUp() {
    this.level += 1;
    // レベルアップでpowerが上昇し、それに連動してhp等も増加
    this.power = Math.round(this.power * 1.25 + 5);
    this._syncStats();
    this.hp = this.maxHp; // レベルアップで全回復
    this.speed *= 1.05;
  }
  _syncStats() {
    this.maxHp   = this.power * 2;
    this.attack  = this.power * 0.6;
    this.defense = this.power * 0.3;
  }
  takeDamage(amount) {
    this.hp -= amount;
    if (this.hp <= 0) { this.hp = 0; this.dead = true; }
  }
  distanceTo(x, y) { return dist(this.x, this.y, x, y); }
  setTargetPoint(x, y) { this.targetX = x; this.targetY = y; this.targetUnitId = null; this.targetBaseId = null; this.targetFoodId = null; }

  /* 移動：地形による速度補正 + 水域回避 */
  moveToward(tx, ty, dt, map, extMult) {
    extMult = extMult == null ? 1 : extMult;
    const dx = tx - this.x, dy = ty - this.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 1) return true;
    let nx = dx / d, ny = dy / d;
    // 水域回避: 進行先が水なら接線方向へ逸らす
    const probeX = this.x + nx * 14, probeY = this.y + ny * 14;
    if (map.isWater(probeX, probeY)) {
      const altAngle = Math.atan2(ny, nx) + (Math.random() < 0.5 ? 1 : -1) * 0.9;
      nx = Math.cos(altAngle); ny = Math.sin(altAngle);
    }
    const terrainSpeed = map.speedFactorAt(this.x, this.y) || 0.01;
    const moveSpeed = this.effSpeed() * terrainSpeed * extMult;
    const step = Math.min(d, moveSpeed * dt);
    const newX = this.x + nx * step, newY = this.y + ny * step;
    if (!map.isWater(newX, newY)) { this.x = newX; this.y = newY; }
    else { this.x = clamp(this.x + nx * step * 0.2, 5, WORLD_SIZE - 5); this.y = clamp(this.y + ny * step * 0.2, 5, WORLD_SIZE - 5); }
    this.x = clamp(this.x, 5, WORLD_SIZE - 5);
    this.y = clamp(this.y, 5, WORLD_SIZE - 5);
    return d <= step + 0.5;
  }

  wander(dt, map, extMult) {
    this.wanderAngle += randRange(-0.5, 0.5) * dt * 2;
    const tx = this.x + Math.cos(this.wanderAngle) * 40;
    const ty = this.y + Math.sin(this.wanderAngle) * 40;
    this.moveToward(tx, ty, dt, map, extMult);
  }
}

/* ---------------- 群れ(フロック) ---------------- */
class Flock {
  constructor(id, factionId) {
    this.id = id;
    this.factionId = factionId;
    this.memberIds = new Set();
    this.leaderId = null;
    this.order = FLOCK_ORDER.NONE;
    this.targetX = null; this.targetY = null;
    this.targetEnemyFactionId = null;
    this.targetBaseId = null;
    this.selected = false;
    this.playerLocked = false;
  }
  centroid(units) {
    let sx = 0, sy = 0, n = 0;
    for (const id of this.memberIds) {
      const u = units.get(id);
      if (u && u.isAlive) { sx += u.x; sy += u.y; n++; }
    }
    if (n === 0) return null;
    return { x: sx / n, y: sy / n };
  }
}

const RANDOM_EVENTS = [

/* ---------------- メインゲームクラス ---------------- */
class Game {
  constructor(canvas, minimapCanvas, ui) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.minimapCanvas = minimapCanvas;
    this.mctx = minimapCanvas.getContext('2d');
    this.ui = ui;
    this.camera = new Camera(canvas);
    this.map = null;
    this.factions = new Map();
    this.units = new Map();
    this.bases = new Map();
    this.food = new Map();
    this.mapItems = new Map();   // MapItem: crystal/gold/clock
    this.fences = new Map();     // Fence: 防衛柵
    this.flocks = new Map();
    this.territory = null; // Uint8Array — 255=中立, 0-4=勢力ID (足跡による領土)
    this.selectedFlockIds = new Set();
    this.eventLog = [];
    this.elapsed = 0;
    this.paused = false;
    this.gameOver = null;
    this.activeEvent = null;
    this.eventTimer = 0;
    this.nextEventAt = randRange(40, 70);
    this.timeStopUntil = 0;       // 時計アイテム: この時刻まで敵ユニット停止
    this.timeStopFactionId = -1;  // 時計を取った勢力
    this.territoryPct = 0;        // プレイヤー領土%
    this.combatWins = 0;          // 戦闘撃破数
    this.combatLosses = 0;        // 戦闘喪失数
    this.timers = {
      hunger: 0, foodSpawn: 0, flockRebuild: 0, baseTick: 0,
      factionEval: 0, winCheck: 0, autosave: 0, combat: 0,
      gold: 0, merge: 0, itemSpawn: 0,
    };
    this.boxSelectRect = null;
    this.notifyCb = null;
  }

  log(msg) {
    const t = Math.floor(this.elapsed);
    this.eventLog.unshift(`[${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}] ${msg}`);
    if (this.eventLog.length > 40) this.eventLog.pop();
    if (this.ui && this.ui.onLog) this.ui.onLog(this.eventLog);
  }

  /* ---------- 初期化 ---------- */
  initNewGame(seed, difficulty) {
    __uid = 1;
    this.seed = seed || Math.floor(Math.random() * 1e9);
    this.map = new WorldMap(this.seed);
    this.camera.map = this.map;
    this.factions.clear(); this.units.clear(); this.bases.clear();
    this.food.clear(); this.flocks.clear(); this.selectedFlockIds.clear();
    this.mapItems.clear();
    this.fences.clear();
    this.eventLog = []; this.elapsed = 0; this.gameOver = null; this.activeEvent = null;
    this.timeStopUntil = 0; this.timeStopFactionId = -1;
    this.territoryPct = 0; this.combatWins = 0; this.combatLosses = 0;
    // 領土グリッド初期化(全タイル中立)
    const dim = Math.ceil(WORLD_SIZE / CELL);
    this.territory = new Uint8Array(dim * dim).fill(255);

    const colors = ['#3da9fc', '#e85d5d', '#f2b134', '#7b5ea7', '#9aa0a6'];
    const names = ['プレイヤー軍', '紅蓮勢', '黄金商団', '紫煙結社', '中立部族'];
    const kinds = ['player', 'cpu', 'cpu', 'cpu', 'neutral'];
    const corners = [
      { x: WORLD_SIZE * 0.18, y: WORLD_SIZE * 0.18 },
      { x: WORLD_SIZE * 0.82, y: WORLD_SIZE * 0.18 },
      { x: WORLD_SIZE * 0.18, y: WORLD_SIZE * 0.82 },
      { x: WORLD_SIZE * 0.82, y: WORLD_SIZE * 0.82 },
      { x: WORLD_SIZE * 0.5,  y: WORLD_SIZE * 0.5  },
    ];
    for (let i = 0; i < 5; i++) {
      const f = new Faction(i, names[i], colors[i], kinds[i], difficulty);
      this.factions.set(i, f);
      const spot = this.map.findLandSpawn(corners[i].x, corners[i].y, 40);
      const base = this.spawnBase(i, spot.x, spot.y, true);
      // 初期ユニット
      const startCount = kinds[i] === 'neutral' ? 10 : 14;
      for (let k = 0; k < startCount; k++) {
        const p = this.map.findLandSpawn(spot.x, spot.y, 80);
        const lvl = k === 0 ? 2 : 1;
        const isLeaderUnit = k === 0;
        const u = this.spawnUnit(i, p.x, p.y, { level: lvl, isLeader: isLeaderUnit });
        if (isLeaderUnit) f.leaderId = u.id;
      }
    }
    this.camera.x = WORLD_SIZE / 2; this.camera.y = WORLD_SIZE / 2; this.camera.zoom = 1.0;
    // HQ周辺に初期領土を付与(中心2タイル半径)
    const tDim = Math.ceil(WORLD_SIZE / CELL);
    for (const b of this.bases.values()) {
      if (!b.isHQ) continue;
      const cgx = Math.floor(b.x / CELL), cgy = Math.floor(b.y / CELL);
      for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
        const gx = clamp(cgx + dx, 0, tDim - 1), gy = clamp(cgy + dy, 0, tDim - 1);
        this.territory[gy * tDim + gx] = b.factionId;
      }
    }
    for (let i = 0; i < 60; i++) this.spawnFoodRandom();
    this.spawnMapItemsInitial();
    this.log('シミュレーションを開始した。');
    this.rebuildFlocks();
  }

  spawnBase(factionId, x, y, isHQ) {
    const b = new Base(nextId(), factionId, x, y, isHQ);
    this.bases.set(b.id, b);
    this.factions.get(factionId).baseIds.add(b.id);
    return b;
  }
  spawnUnit(factionId, x, y, opts) {
    const u = new Unit(nextId(), factionId, x, y, opts);
    this.units.set(u.id, u);
    this.factions.get(factionId).unitIds.add(u.id);
    return u;
  }
  spawnFoodRandom() {
    if (this.food.size >= 180) return;
    for (let i = 0; i < 40; i++) {
      const x = randRange(40, WORLD_SIZE - 40), y = randRange(40, WORLD_SIZE - 40);
      if (!this.map.isWater(x, y)) {
        const f = new Food(nextId(), x, y);
        this.food.set(f.id, f);
        return f;
      }
    }
    return null;
  }

  /* ---------- メインアップデート ---------- */
  update(dt) {
    if (this.gameOver || this.paused) return;
    dt = Math.min(dt, 0.05);
    this.elapsed += dt;

    // 個体ごとのフレーム処理（移動・思考タイマー・クールダウン）
    this.rebuildSpatialGrid();
    if (this.territory) this.claimTerritoryPass();
    const frozen = this.elapsed < this.timeStopUntil; // 時計アイテム効果中
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      // 時間停止中は取得した勢力以外を凍結
      if (frozen && u.factionId !== this.timeStopFactionId) { u.attackCooldown -= dt; continue; }
      u.thinkCooldown -= dt;
      if (u.thinkCooldown <= 0) {
        const f = this.factions.get(u.factionId);
        u.thinkCooldown = (DIFFICULTY[f.difficulty] || DIFFICULTY.normal).thinkInterval * randRange(0.85, 1.15);
        this.unitThink(u);
      }
      this.unitAct(u, dt);
      u.age += dt;
      u.attackCooldown -= dt;
      u.breedCooldown -= dt;
    }

    this.timers.combat += dt;
    if (this.timers.combat >= 0.18) { this.timers.combat = 0; this.combatPass(); }

    this.timers.hunger += dt;
    if (this.timers.hunger >= 1) { this.timers.hunger = 0; this.hungerPass(); this.breedPass(); this.capturePass(); this.hqRepairPass(); }

    this.timers.gold += dt;
    if (this.timers.gold >= 1) { this.timers.gold = 0; this.goldPass(); }

    this.timers.merge += dt;
    if (this.timers.merge >= 2) { this.timers.merge = 0; this.mergePass(); }

    this.timers.itemSpawn += dt;
    if (this.timers.itemSpawn >= 30) { this.timers.itemSpawn = 0; this.spawnMapItemRandom(); }

    this.timers.foodSpawn += dt;
    if (this.timers.foodSpawn >= 3.5) { this.timers.foodSpawn = 0; this.spawnFoodRandom(); this.spawnFoodRandom(); this.spawnFoodRandom(); }

    this.timers.flockRebuild += dt;
    if (this.timers.flockRebuild >= 1.2) { this.timers.flockRebuild = 0; this.rebuildFlocks(); }
    this.aiTick(dt);

    this.timers.baseTick += dt;
    if (this.timers.baseTick >= 1) {
      this.timers.baseTick = 0;
      for (const b of this.bases.values()) b.growPopulation(1, this.factions.get(b.factionId));
    }

    this.timers.factionEval += dt;
    if (this.timers.factionEval >= 2) { this.timers.factionEval = 0; this.factionEvaluation(); }

    this.timers.winCheck += dt;
    if (this.timers.winCheck >= 1) { this.timers.winCheck = 0; this.checkWinLose(); }

    this.timers.autosave += dt;
    if (this.timers.autosave >= 30) { this.timers.autosave = 0; this.save('autosave'); this.log('オートセーブ完了。'); }

    this.eventTimer += dt;
    if (!this.activeEvent && this.eventTimer >= this.nextEventAt) { this.eventTimer = 0; this.triggerRandomEvent(); }
    if (this.activeEvent) {
      this.activeEvent.remain -= dt;
      if (this.activeEvent.remain <= 0) { this.log(`${this.activeEvent.def.label} の影響が収まった。`); this.activeEvent = null; }
    }

    this.cleanupDead();
  }

  rebuildSpatialGrid() {
    if (!this.sgrid) this.sgrid = new SpatialGrid(GRID_CELL, WORLD_SIZE);
    this.sgrid.rebuild(Array.from(this.units.values()).filter(u => u.isAlive));
    if (!this.fgrid) this.fgrid = new SpatialGrid(GRID_CELL, WORLD_SIZE);
    this.fgrid.rebuild(Array.from(this.food.values()));
  }

  /* ---------- 領土: 足跡システム (モナークモナーク核心) ----------
     ユニットが通過したタイルがその勢力の領土になる。
     敵ユニットが踏めば上書きされる(奪還)。
     領土が広いほどユニットの攻撃力・防御力が上昇する。              */
  claimTerritoryPass() {
    if (!this.territory) return;
    const dim = Math.ceil(WORLD_SIZE / CELL);
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      const gx = clamp(Math.floor(u.x / CELL), 0, dim - 1);
      const gy = clamp(Math.floor(u.y / CELL), 0, dim - 1);
      const idx = gy * dim + gx;
      if (this.territory[idx] !== u.factionId) {
        const prev = this.territory[idx];
        this.territory[idx] = u.factionId;
        // 奪還スコア(敵領土を踏んだとき)
        if (prev !== 255) {
          const fac = this.factions.get(u.factionId);
          if (fac) fac.score += 0.5;
        }
      }
    }
  }

  cleanupDead() {
    const leaderLostFactions = new Set();
    for (const [id, u] of this.units) {
      if (!u.isAlive) {
        const f = this.factions.get(u.factionId);
        if (f) f.unitIds.delete(id);
        if (u.flockId) { const fl = this.flocks.get(u.flockId); if (fl) fl.memberIds.delete(id); }
        if (f && f.leaderId === id) { f.leaderId = null; f.applyMorale(-50); leaderLostFactions.add(f.id); this.log(`${f.name}のリーダーが戦死した！士気が大きく低下。`); }
        this.units.delete(id);
      }
    }
    // リーダー再選出: 各勢力で最も高レベルの生存ユニットを新リーダーに任命
    for (const fid of leaderLostFactions) {
      const f = this.factions.get(fid);
      if (!f || !f.alive) continue;
      let best = null;
      for (const uid of f.unitIds) {
        const u = this.units.get(uid);
        if (!u || !u.isAlive) continue;
        if (!best || u.level > best.level || (u.level === best.level && u.hp > best.hp)) best = u;
      }
      if (best) {
        best.isLeader = true;
        f.leaderId = best.id;
        best.maxHp *= 1.15; best.hp = Math.min(best.maxHp, best.hp * 1.15);
        best.attack *= 1.1; best.defense *= 1.1;
        this.log(`${f.name}は新たなリーダーを選出した。`);
      }
    }
  }

  /* ---------- 空腹・餓死 ---------- */
  hungerPass() {
    const eventMult = this.activeEvent && this.activeEvent.def.key === 'harvest' ? 0.5 : 1;
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      u.hunger += 1.1 * eventMult;
      if (u.hunger > 150) { u.dead = true; continue; }
      if (u.hunger > 100) u.takeDamage(u.maxHp * 0.025);
    }
  }

  /* ---------- 個体思考（フロックの命令を個体の目標へ変換） ---------- */
  nearbyEnemyPower(u, radius) {
    const list = this.sgrid.queryRadius(u.x, u.y, radius);
    let power = 0;
    for (const o of list) {
      if (o.factionId === u.factionId || !o.isAlive) continue;
      if (dist(u.x, u.y, o.x, o.y) <= radius) power += o.effAttack() + o.effDefense() + o.hp * 0.05;
    }
    return power;
  }
  nearestEnemyUnit(u, radius) {
    const list = this.sgrid.queryRadius(u.x, u.y, radius);
    let best = null, bd = Infinity;
    for (const o of list) {
      if (o.factionId === u.factionId || !o.isAlive) continue;
      const d = dist2(u.x, u.y, o.x, o.y);
      if (d < radius * radius && d < bd) { bd = d; best = o; }
    }
    return best;
  }
  nearestFood(u, radius) {
    const list = this.fgrid.queryRadius(u.x, u.y, radius);
    let best = null, bd = Infinity;
    for (const f of list) {
      const d = dist2(u.x, u.y, f.x, f.y);
      if (d < radius * radius && d < bd) { bd = d; best = f; }
    }
    return best;
  }
  nearestOwnBase(u) {
    let best = null, bd = Infinity;
    for (const b of this.bases.values()) {
      if (b.factionId !== u.factionId) continue;
      const d = dist2(u.x, u.y, b.x, b.y);
      if (d < bd) { bd = d; best = b; }
    }
    return best;
  }
  formationOffset(u, flock) {
    if (!flock) return { ox: 0, oy: 0 };
    const idx = Array.from(flock.memberIds.values()).indexOf(u.id);
    const ang = (idx % 8) / 8 * Math.PI * 2;
    const r = 14 * Math.floor(idx / 8 + 1);
    return { ox: Math.cos(ang) * r, oy: Math.sin(ang) * r };
  }

  updateLeaderBuff(u) {
    const fac = this.factions.get(u.factionId);
    u.buffMult.atk = 1; u.buffMult.def = 1; u.buffMult.spd = 1;
    if (!fac || fac.leaderId == null || fac.leaderId === u.id) return;
    const leader = this.units.get(fac.leaderId);
    if (leader && leader.isAlive && dist(u.x, u.y, leader.x, leader.y) <= 300) {
      u.buffMult.atk = 1.2; u.buffMult.def = 1.2; u.buffMult.spd = 1.1;
    }
  }

  unitThink(u) {
    if (!u.isAlive) return;
    this.updateLeaderBuff(u);
    const flock = u.flockId ? this.flocks.get(u.flockId) : null;
    const order = flock ? flock.order : FLOCK_ORDER.NONE;
    const fac = this.factions.get(u.factionId);

    // 自己防衛本能：劣勢かつ負傷時は命令を一時的に無視して撤退
    if (order !== FLOCK_ORDER.RETREAT && u.hp < u.maxHp * 0.45) {
      const danger = this.nearbyEnemyPower(u, 130);
      const selfPower = u.effAttack() + u.effDefense() + u.hp * 0.05;
      if (danger > selfPower * (1.6 + (fac ? fac.moraleRetreatBias() : 0))) {
        const ob = this.nearestOwnBase(u);
        u.state = UNIT_STATE.RETREAT;
        if (ob) u.setTargetPoint(ob.x + randRange(-20, 20), ob.y + randRange(-20, 20));
        else u.setTargetPoint(WORLD_SIZE / 2, WORLD_SIZE / 2);
        return;
      }
    }
    // 生存本能：深刻な空腹時は命令を一時的に無視して採食を優先する
    if (u.hunger > 80) {
      const f = this.nearestFood(u, u.sight * 2.0);
      if (f) { u.setTargetPoint(f.x, f.y); u.targetFoodId = f.id; u.state = UNIT_STATE.SEEK_FOOD; return; }
    }

    switch (order) {
      case FLOCK_ORDER.ATTACK: this._thinkAttack(u, flock); break;
      case 'occupy': this._thinkOccupy(u, flock); break;
      case FLOCK_ORDER.BUILD: this._thinkBuild(u, flock); break;
      case FLOCK_ORDER.MOVE: this._thinkMove(u, flock); break;
      case FLOCK_ORDER.DEFEND: this._thinkDefend(u, flock); break;
      case FLOCK_ORDER.RETREAT: this._thinkRetreat(u, flock); break;
      case FLOCK_ORDER.EXPLORE: this._thinkExplore(u, flock); break;
      case 'food': this._thinkFood(u, flock); break;
      default: this._thinkAutonomous(u, flock); break;
    }
  }

  _thinkAutonomous(u) {
    if (u.hunger > 45) {
      const f = this.nearestFood(u, u.sight);
      if (f) { u.setTargetPoint(f.x, f.y); u.targetFoodId = f.id; u.state = UNIT_STATE.SEEK_FOOD; return; }
    }
    const enemy = this.nearestEnemyUnit(u, u.sight * 0.5);
    if (enemy) { u.state = UNIT_STATE.ATTACK; u.targetUnitId = enemy.id; u.setTargetPoint(enemy.x, enemy.y); return; }
    u.state = UNIT_STATE.WANDER;
  }
  _thinkBuild(u, flock) {
    // 柵建設: まだ建設目標がなければ現在地付近にランダムに目標設定
    if (u.targetX == null) {
      const ang = Math.random() * Math.PI * 2, r = randRange(10, 50);
      u.setTargetPoint(
        clamp(u.x + Math.cos(ang) * r, 20, WORLD_SIZE - 20),
        clamp(u.y + Math.sin(ang) * r, 20, WORLD_SIZE - 20)
      );
    }
    u.state = UNIT_STATE.IDLE;
  }
  _thinkFood(u, flock) {
    const f = this.nearestFood(u, u.sight * 1.4) || (flock && flock.targetX != null ? { x: flock.targetX, y: flock.targetY } : null);
    if (f) { u.setTargetPoint(f.x, f.y); if (f.id != null) u.targetFoodId = f.id; u.state = UNIT_STATE.SEEK_FOOD; }
    else u.state = UNIT_STATE.WANDER;
  }
  _thinkMove(u, flock) {
    if (flock && flock.targetX != null) {
      const o = this.formationOffset(u, flock);
      u.state = UNIT_STATE.MOVE; u.setTargetPoint(flock.targetX + o.ox, flock.targetY + o.oy);
    } else u.state = UNIT_STATE.WANDER;
  }
  _thinkAttack(u, flock) {
    const enemy = this.nearestEnemyUnit(u, u.sight * 1.6);
    if (enemy) { u.state = UNIT_STATE.ATTACK; u.targetUnitId = enemy.id; u.setTargetPoint(enemy.x, enemy.y); return; }
    if (flock && flock.targetBaseId != null) {
      const b = this.bases.get(flock.targetBaseId);
      if (b) { u.state = UNIT_STATE.ATTACK; u.setTargetPoint(b.x + randRange(-30, 30), b.y + randRange(-30, 30)); return; }
    }
    if (flock && flock.targetX != null) { u.state = UNIT_STATE.MOVE; u.setTargetPoint(flock.targetX, flock.targetY); return; }
    u.state = UNIT_STATE.WANDER;
  }
  _thinkOccupy(u, flock) {
    const baseId = flock ? flock.targetBaseId : null;
    const b = baseId != null ? this.bases.get(baseId) : null;
    if (b) {
      const enemy = this.nearestEnemyUnit(u, u.sight * 0.7);
      if (enemy && dist(u.x, u.y, b.x, b.y) < b.radius + 40) { u.state = UNIT_STATE.ATTACK; u.targetUnitId = enemy.id; u.setTargetPoint(enemy.x, enemy.y); return; }
      const ang = Math.random() * Math.PI * 2, r = Math.random() * (b.radius * 0.7);
      u.state = UNIT_STATE.OCCUPY; u.setTargetPoint(b.x + Math.cos(ang) * r, b.y + Math.sin(ang) * r);
    } else u.state = UNIT_STATE.WANDER;
  }
  _thinkDefend(u, flock) {
    const px = flock && flock.targetX != null ? flock.targetX : u.x;
    const py = flock && flock.targetY != null ? flock.targetY : u.y;
    const enemy = this.nearestEnemyUnit(u, u.sight * 0.7);
    if (enemy) { u.state = UNIT_STATE.ATTACK; u.targetUnitId = enemy.id; u.setTargetPoint(enemy.x, enemy.y); return; }
    u.state = UNIT_STATE.DEFEND;
    if (dist(u.x, u.y, px, py) > 60) u.setTargetPoint(px + randRange(-30, 30), py + randRange(-30, 30));
    else u.setTargetPoint(u.x + randRange(-10, 10), u.y + randRange(-10, 10));
  }
  _thinkRetreat(u) {
    const b = this.nearestOwnBase(u);
    u.state = UNIT_STATE.RETREAT;
    if (b) u.setTargetPoint(b.x + randRange(-30, 30), b.y + randRange(-30, 30));
    else u.setTargetPoint(WORLD_SIZE / 2, WORLD_SIZE / 2);
  }
  _thinkExplore(u, flock) {
    if (flock && flock.targetX != null && dist(u.x, u.y, flock.targetX, flock.targetY) > 50) {
      u.state = UNIT_STATE.EXPLORE; u.setTargetPoint(flock.targetX, flock.targetY);
    } else { u.state = UNIT_STATE.EXPLORE; u.wanderAngle += randRange(-0.3, 0.3); u.setTargetPoint(u.x + Math.cos(u.wanderAngle) * 80, u.y + Math.sin(u.wanderAngle) * 80); }
  }

  /* ---------- 個体の実行（移動など） ---------- */
  unitAct(u, dt) {
    if (!u.isAlive) return;
    let speedMult = (this.activeEvent && this.activeEvent.def.key === 'storm') ? 0.5 : 1;
    // 柵通過ペナルティ: 敵の柵の近くでは大幅減速し、柵にダメージ
    if (this.fences.size > 0) {
      for (const fence of this.fences.values()) {
        if (fence.factionId === u.factionId) continue;
        if (dist(u.x, u.y, fence.x, fence.y) < 20) {
          speedMult *= 0.22; // 大幅減速(モナークモナーク式)
          fence.hp -= u.effAttack() * dt * 0.8;
          if (fence.hp <= 0) {
            this.fences.delete(fence.id);
            const fac = this.factions.get(u.factionId);
            if (fac) fac.score += 8;
            this.log(`柵が破壊された。`);
          }
          break;
        }
      }
    }
    if (u.targetX != null) u.moveToward(u.targetX, u.targetY, dt, this.map, speedMult);
    else u.wander(dt, this.map, speedMult);
    this.tryEatNearbyFood(u);
    this.tryPickupMapItem(u);
    // 柵建設: 目標地点に到着したら柵を建てる
    if (u.order === FLOCK_ORDER.BUILD && u.targetX != null) {
      if (dist(u.x, u.y, u.targetX, u.targetY) < 15) {
        this.tryBuildFence(u);
        u.targetX = null; u.targetY = null;
      }
    }
  }

  tryBuildFence(u) {
    const FENCE_COST = 60, MAX_FACTION_FENCES = 25;
    const fac = this.factions.get(u.factionId);
    if (!fac || fac.gold < FENCE_COST) return;
    // 近くにすでに柵があれば建設しない
    for (const f of this.fences.values()) {
      if (dist(f.x, f.y, u.x, u.y) < 28) return;
    }
    // 勢力の柵数上限
    let count = 0;
    for (const f of this.fences.values()) { if (f.factionId === u.factionId) count++; }
    if (count >= MAX_FACTION_FENCES) return;
    const fence = new Fence(nextId(), u.x, u.y, u.factionId);
    this.fences.set(fence.id, fence);
    fac.gold -= FENCE_COST;
    u.state = UNIT_STATE.IDLE;
  }

  /* マップアイテム取得 */
  tryPickupMapItem(u) {
    if (!u.isAlive) return;
    const PICK_R = 20;
    for (const item of this.mapItems.values()) {
      if (dist(u.x, u.y, item.x, item.y) > PICK_R) continue;
      this.mapItems.delete(item.id);
      const fac = this.factions.get(u.factionId);
      if (item.type === 'crystal') {
        // クリスタル: 戦力数値を大幅増加 (モナークモナーク式)
        u.power = Math.round(u.power * 1.5 + 50);
        u._syncStats();
        u.hp = u.maxHp;
        if (fac) fac.score += 30;
        this.log(`✨ ${fac ? fac.name : '?'}のユニットがクリスタルを入手！戦力 → ${u.power}。`);
      } else if (item.type === 'gold') {
        if (fac) { fac.gold += 600; fac.score += 20; }
        this.log(`💰 ${fac ? fac.name : '?'}が資金袋を入手(+600G)。`);
      } else if (item.type === 'clock') {
        this.timeStopUntil = this.elapsed + 8;
        this.timeStopFactionId = u.factionId;
        if (fac) fac.score += 15;
        this.log(`⏰ ${fac ? fac.name : '?'}が時計を入手！25秒間敵が停止。`);
      }
      break;
    }
  }

  /* 食料取得：接触範囲内の食料を消費し、空腹度回復と経験値を得る */
  tryEatNearbyFood(u) {
    if (!u.isAlive || !this.fgrid) return;
    const EAT_RADIUS = 16;
    const nearby = this.fgrid.queryRadius(u.x, u.y, EAT_RADIUS);
    for (const f of nearby) {
      if (!this.food.has(f.id)) continue; // 同フレーム内で他ユニットが先に取得済み
      if (dist(u.x, u.y, f.x, f.y) > EAT_RADIUS) continue;
      this.food.delete(f.id);
      u.hunger = Math.max(0, u.hunger - f.value * 2.0);
      u.gainExp(6, this);
      if (u.targetFoodId === f.id) { u.targetFoodId = null; }
      break; // 1ユニットにつき1フレーム1個まで
    }
  }

  /* ---------- 戦闘 ---------- */
  /* ---------- 戦闘: 数字が大きいキャラが小さいキャラを吸収する ----------
     モナークモナーク核心メカニクス。
     実効戦力 = power × 領土補正 × 士気補正
     実効戦力が上回った側が相手を吸収し、powerが増加する。          */
  combatPass() {
    const TOUCH = 24;
    const alive = Array.from(this.units.values()).filter(u => u.isAlive);
    for (const u of alive) {
      if (!u.isAlive || u.attackCooldown > 0) continue;
      const uFac = this.factions.get(u.factionId);
      const uEff = u.effPower(uFac ? uFac.territoryMult : 1, uFac ? uFac.moraleAttackMult() : 1);

      const list = this.sgrid.queryRadius(u.x, u.y, TOUCH + 4);
      for (const o of list) {
        if (o === u || !o.isAlive || o.factionId === u.factionId) continue;
        if (dist(u.x, u.y, o.x, o.y) > TOUCH) continue;

        const oFac = this.factions.get(o.factionId);
        const oEff = o.effPower(oFac ? oFac.territoryMult : 1, oFac ? oFac.moraleAttackMult() : 1);

        u.state = UNIT_STATE.ATTACK; u.targetUnitId = o.id;
        u.attackCooldown = 0.8;

        if (uEff > oEff) {
          // u が o を吸収: oのpowerの半分をuが獲得
          const gain = Math.round(o.power * 0.5);
          u.power += gain;
          u._syncStats();
          u.hp = Math.min(u.maxHp, u.hp + gain);
          o.dead = true;
          u.gainExp(o.isLeader ? 60 : 25, this);
          if (uFac) uFac.score += o.isLeader ? 40 : 10;
          if (u.factionId === 0) this.combatWins++;
          if (o.factionId === 0) this.combatLosses++;
        } else if (oEff > uEff) {
          // o が u を吸収(oは別のターンで自分が主体のときに処理)
          // uは小さいので少しHPを削られる(すぐ吸収されるまでの猶予)
          u.takeDamage(Math.round(o.power * 0.15));
        } else {
          // 同等: 両者わずかにダメージ(膠着状態)
          u.takeDamage(2);
          o.takeDamage(2);
        }

        // power上限
        if (u.power > 9999) u.power = 9999;
        break;
      }
    }
  }

  /* ---------- 繁殖 ---------- */
  breedPass() {
    for (const fac of this.factions.values()) {
      if (fac.kind === 'neutral') continue;
      if (fac.population >= SOFT_POP_CAP) continue;
      const diff = DIFFICULTY[fac.difficulty] || DIFFICULTY.normal;
      for (const id of Array.from(fac.unitIds)) {
        const u = this.units.get(id);
        if (!u || !u.isAlive) continue;
        if (u.level < 2 || u.hunger > 50 || u.breedCooldown > 0) continue;
        if (this.nearbyEnemyPower(u, 150) > 0) continue;
        const chance = 0.35 * diff.breedMult * fac.moraleBreedMult();
        if (Math.random() < chance) {
          const spot = this.map.findLandSpawn(u.x, u.y, 40);
          this.spawnUnit(fac.id, spot.x, spot.y, { level: 1 });
          u.breedCooldown = 60;
          u.gainExp(5, this);
        }
      }
    }
  }

  /* ---------- 拠点占領 ---------- */
  capturePass() {
    for (const b of this.bases.values()) {
      const nearby = this.sgrid.queryRadius(b.x, b.y, b.radius + 60);
      const powerByFaction = new Map();
      for (const u of nearby) {
        if (!u.isAlive || dist(u.x, u.y, b.x, b.y) > b.radius + 60) continue;
        const p = u.effAttack() + u.effDefense() * 0.5;
        powerByFaction.set(u.factionId, (powerByFaction.get(u.factionId) || 0) + p);
      }
      let topF = null, topP = 0, secondP = 0;
      for (const [fid, p] of powerByFaction) { if (p > topP) { secondP = topP; topP = p; topF = fid; } else if (p > secondP) secondP = p; }
      if (topF != null && topF !== b.factionId && topP > secondP * 1.15 && topP > b.defense * 0.6) {
        if (b.capturingFactionId !== topF) { b.capturingFactionId = topF; b.captureProgress = 0; }
        b.captureProgress += 8 + topP * 0.05;
        if (b.captureProgress >= 100) {
          const prevOwner = this.factions.get(b.factionId);
          const newOwner = this.factions.get(topF);
          if (prevOwner) { prevOwner.baseIds.delete(b.id); prevOwner.applyMorale(b.isHQ ? -30 : -10); }
          if (newOwner) { newOwner.baseIds.add(b.id); newOwner.applyMorale(10); newOwner.score += b.isHQ ? 60 : 20; }
          this.log(`${newOwner ? newOwner.name : '?'}が${prevOwner ? prevOwner.name : '中立'}の${b.name}を占領した！`);
          b.factionId = topF; b.captureProgress = 0; b.capturingFactionId = null;
          b.population = Math.max(4, Math.round(b.population * 0.5));
          for (const u of nearby) { if (u.isAlive && u.factionId === topF) u.gainExp(15, this); }
        }
      } else {
        b.captureProgress = Math.max(0, b.captureProgress - 5);
        if (b.captureProgress === 0) b.capturingFactionId = null;
      }
    }
  }

  /* ---------- 資金経済 (モナークモナーク式) ---------- */
  goldPass() {
    for (const fac of this.factions.values()) {
      if (!fac.alive) continue;
      // 収入: 拠点ティアに応じた資金
      fac.gold += fac.goldIncome(this.bases);
      // 維持費: 高レベルユニットはコストがかかる
      let upkeep = 0;
      for (const uid of fac.unitIds) {
        const u = this.units.get(uid);
        if (!u || !u.isAlive) continue;
        if (u.level >= 6) upkeep += 3;
        else if (u.level >= 4) upkeep += 1;
      }
      fac.gold = Math.max(0, fac.gold - upkeep);
      // 資金ゼロが続くと士気が落ちる
      if (fac.gold === 0 && upkeep > 0) fac.applyMorale(-4);
    }
  }

  /* ---------- HQ修復 (資金で城壁回復) ---------- */
  hqRepairPass() {
    for (const b of this.bases.values()) {
      if (!b.isHQ) continue;
      const fac = this.factions.get(b.factionId);
      if (!fac || fac.gold < 100) continue;
      if (b.population < b.popCap) {
        b.population += 1;
        fac.gold -= 50;
      }
    }
  }

  /* ---------- ユニット合体 (モナークモナーク式) ---------- */
  mergePass() {
    const MERGE_R = 18;
    for (const fac of this.factions.values()) {
      if (!fac.alive) continue;
      const units = Array.from(fac.unitIds).map(id => this.units.get(id)).filter(u => u && u.isAlive);
      const merged = new Set();
      for (let i = 0; i < units.length; i++) {
        if (merged.has(units[i].id)) continue;
        for (let j = i + 1; j < units.length; j++) {
          if (merged.has(units[j].id)) continue;
          const a = units[i], b = units[j];
          if (dist(a.x, b.x, a.y, b.y) > MERGE_R) continue;
          if (a.flockId !== b.flockId) continue;
          if (a.state !== UNIT_STATE.IDLE && a.state !== UNIT_STATE.WANDER &&
              b.state !== UNIT_STATE.IDLE && b.state !== UNIT_STATE.WANDER) continue;
          // powerが大きい方が小さい方を吸収(モナークモナーク式合体)
          const keep = a.power >= b.power ? a : b;
          const gone = keep === a ? b : a;
          keep.power = Math.min(9999, keep.power + Math.round(gone.power * 0.6));
          keep._syncStats();
          keep.hp = Math.min(keep.maxHp, keep.hp + Math.round(gone.hp * 0.5));
          keep.exp += gone.exp * 0.3;
          keep.gainExp(0, this);
          gone.dead = true;
          merged.add(gone.id);
          break;
        }
      }
    }
  }

  /* ---------- マップアイテム生成 ---------- */
  spawnMapItemsInitial() {
    const types = ['crystal', 'crystal', 'gold', 'gold', 'gold', 'clock', 'clock'];
    for (const type of types) this.spawnMapItemRandom(type);
  }
  spawnMapItemRandom(forcedType) {
    if (this.mapItems.size >= 10) return;
    const types = ['crystal', 'gold', 'gold', 'gold', 'clock'];
    const type = forcedType || types[Math.floor(Math.random() * types.length)];
    for (let attempt = 0; attempt < 40; attempt++) {
      const x = randRange(80, WORLD_SIZE - 80), y = randRange(80, WORLD_SIZE - 80);
      if (this.map.isWater(x, y)) continue;
      // 拠点から離れた場所に配置
      let tooClose = false;
      for (const b of this.bases.values()) { if (dist(b.x, b.y, x, y) < 150) { tooClose = true; break; } }
      if (tooClose) continue;
      const item = new MapItem(nextId(), x, y, type);
      this.mapItems.set(item.id, item);
      return item;
    }
  }

  /* ---------- 群れ再編成 ---------- */
  rebuildFlocks() {
    const byFaction = new Map();
    for (const u of this.units.values()) {
      if (!u.isAlive) continue;
      if (!byFaction.has(u.factionId)) byFaction.set(u.factionId, []);
      byFaction.get(u.factionId).push(u);
    }
    const newFlocks = new Map();
    const RADIUS = 200;
    for (const [fid, list] of byFaction) {
      const grid = new SpatialGrid(RADIUS, WORLD_SIZE);
      grid.rebuild(list);
      const visited = new Set();
      for (const u0 of list) {
        if (visited.has(u0.id)) continue;
        const cluster = [];
        const stack = [u0];
        visited.add(u0.id);
        while (stack.length) {
          const cur = stack.pop();
          cluster.push(cur);
          const neigh = grid.queryRadius(cur.x, cur.y, RADIUS);
          for (const n of neigh) {
            if (visited.has(n.id)) continue;
            if (dist(cur.x, cur.y, n.x, n.y) <= RADIUS) { visited.add(n.id); stack.push(n); }
          }
        }
        const votes = new Map();
        for (const cu of cluster) if (cu.flockId != null) votes.set(cu.flockId, (votes.get(cu.flockId) || 0) + 1);
        let chosenId = null, bestV = 0;
        for (const [vid, v] of votes) if (v > bestV && !newFlocks.has(vid)) { bestV = v; chosenId = vid; }
        if (chosenId == null) chosenId = 'f' + nextId();
        const old = this.flocks.get(chosenId);
        const flock = new Flock(chosenId, fid);
        if (old) {
          flock.order = old.order; flock.selected = old.selected;
          flock.targetX = old.targetX; flock.targetY = old.targetY;
          flock.targetEnemyFactionId = old.targetEnemyFactionId; flock.targetBaseId = old.targetBaseId;
          flock.playerLocked = old.playerLocked;
        }
        let leader = null;
        for (const cu of cluster) { flock.memberIds.add(cu.id); cu.flockId = chosenId; if (!leader || cu.level > leader.level) leader = cu; }
        flock.leaderId = leader ? leader.id : null;
        newFlocks.set(chosenId, flock);
      }
    }
    this.flocks = newFlocks;
    // 選択集合のクリーンアップ
    for (const id of Array.from(this.selectedFlockIds)) if (!this.flocks.has(id)) this.selectedFlockIds.delete(id);
  }

  /* ---------- CPU/中立のフロックAI（効用関数による意思決定） ---------- */
  flockPower(flock) {
    const fac = this.factions.get(flock.factionId);
    const terrM = fac ? (fac.territoryMult || 1) : 1;
    const morM  = fac ? fac.moraleAttackMult() : 1;
    let p = 0;
    for (const id of flock.memberIds) { const u = this.units.get(id); if (u && u.isAlive) p += u.effPower(terrM, morM); }
    return p;
  }
  enemyLocalPower(x, y, radius, excludeFaction) {
    const list = this.sgrid.queryRadius(x, y, radius);
    let p = 0;
    for (const o of list) {
      if (o.factionId === excludeFaction || !o.isAlive || dist(x, y, o.x, o.y) > radius) continue;
      const oFac = this.factions.get(o.factionId);
      p += o.effPower(oFac ? oFac.territoryMult : 1, oFac ? oFac.moraleAttackMult() : 1);
    }
    return p;
  }

  evaluateFlockUtility(flock, fac) {
    const c = flock.centroid(this.units);
    if (!c) return;
    const ourPower = this.flockPower(flock);
    const memberCount = flock.memberIds.size;
    const sight = 260 + memberCount * 6;
    let best = { score: -1e9, order: FLOCK_ORDER.EXPLORE };

    // 群れの平均空腹度に応じて採食の緊急度を算出（空腹なほど食料を強く優先する）
    let hungerSum = 0, hungerN = 0;
    for (const id of flock.memberIds) { const u = this.units.get(id); if (u && u.isAlive) { hungerSum += u.hunger; hungerN++; } }
    const avgHunger = hungerN ? hungerSum / hungerN : 0;
    const hungerUrgency = clamp((avgHunger - 50) / 70, 0, 1.6);
    const foodSearchR = sight * (1 + hungerUrgency * 0.7);

    // 食料
    const foodCandidates = this.fgrid.queryRadius(c.x, c.y, foodSearchR);
    for (const f of foodCandidates) {
      const d = dist(c.x, c.y, f.x, f.y);
      if (d > foodSearchR) continue;
      const score = f.value * (1.4 + hungerUrgency * 14) - d * 0.05;
      if (score > best.score) best = { score, order: 'food', x: f.x, y: f.y };
    }
    // 敵ユニット（群れ）
    const enemyUnits = this.sgrid.queryRadius(c.x, c.y, sight * 1.3);
    const seenFactions = new Set();
    for (const eu of enemyUnits) {
      if (eu.factionId === fac.id || !eu.isAlive || seenFactions.has(eu.id)) continue;
      const d = dist(c.x, c.y, eu.x, eu.y);
      if (d > sight * 1.3) continue;
      const enemyPower = this.enemyLocalPower(eu.x, eu.y, 150, -999);
      const successRate = clamp(ourPower / Math.max(1, enemyPower), 0, 2.2);
      const reward = 30 + (eu.isLeader ? 50 : 0);
      const danger = enemyPower * 0.55;
      const score = (ourPower - enemyPower) * 1.3 - d * 0.045 - danger + successRate * 16 + reward * 0.4;
      if (score > best.score) best = { score, order: FLOCK_ORDER.ATTACK, x: eu.x, y: eu.y, enemyFactionId: eu.factionId };
    }
    // 拠点（占領対象：敵・中立）
    for (const b of this.bases.values()) {
      if (b.factionId === fac.id) continue;
      const d = dist(c.x, c.y, b.x, b.y);
      if (d > sight * 1.6) continue;
      const tierVal = b.isHQ ? 120 : 35 + b.tier * 18;
      const defenders = this.enemyLocalPower(b.x, b.y, b.radius + 60, -999);
      const successRate = clamp(ourPower / Math.max(1, b.defense * 0.7 + defenders), 0, 2.2);
      const score = tierVal - d * 0.04 - (b.defense + defenders) * 0.35 + successRate * 20;
      if (score > best.score) best = { score, order: 'occupy', x: b.x, y: b.y, baseId: b.id };
    }

    if (best.score < 6) {
      flock.order = FLOCK_ORDER.EXPLORE;
      if (flock.targetX == null || dist(c.x, c.y, flock.targetX, flock.targetY) < 80) {
        const ang = Math.random() * Math.PI * 2, r = randRange(200, 500);
        flock.targetX = clamp(c.x + Math.cos(ang) * r, 50, WORLD_SIZE - 50);
        flock.targetY = clamp(c.y + Math.sin(ang) * r, 50, WORLD_SIZE - 50);
      }
      return;
    }
    flock.order = best.order;
    flock.targetX = best.x; flock.targetY = best.y;
    flock.targetBaseId = best.baseId != null ? best.baseId : null;
    flock.targetEnemyFactionId = best.enemyFactionId != null ? best.enemyFactionId : null;
  }

  evaluateFlockNeutral(flock) {
    // 中立勢力は侵略せず、採食と防衛のみ
    const c = flock.centroid(this.units);
    if (!c) return;
    const danger = this.enemyLocalPower(c.x, c.y, 220, flock.factionId);
    if (danger > 30) { flock.order = FLOCK_ORDER.DEFEND; flock.targetX = c.x; flock.targetY = c.y; return; }
    let hungerSum = 0, hungerN = 0;
    for (const id of flock.memberIds) { const u = this.units.get(id); if (u && u.isAlive) { hungerSum += u.hunger; hungerN++; } }
    const avgHunger = hungerN ? hungerSum / hungerN : 0;
    const searchR = 300 + clamp((avgHunger - 50) / 70, 0, 1.6) * 260;
    const f = this.nearestFood({ x: c.x, y: c.y, sight: searchR }, searchR) || null;
    if (f) { flock.order = 'food'; flock.targetX = f.x; flock.targetY = f.y; return; }
    flock.order = FLOCK_ORDER.EXPLORE;
    if (flock.targetX == null || dist(c.x, c.y, flock.targetX, flock.targetY) < 60) {
      const ang = Math.random() * Math.PI * 2, r = randRange(150, 350);
      flock.targetX = clamp(c.x + Math.cos(ang) * r, 50, WORLD_SIZE - 50);
      flock.targetY = clamp(c.y + Math.sin(ang) * r, 50, WORLD_SIZE - 50);
    }
  }

  /* プレイヤーが命令したフロックの完了判定（達成したら自律行動へ戻す） */
  maintainPlayerOrder(flock) {
    const c = flock.centroid(this.units);
    if (!c) return;
    switch (flock.order) {
      case FLOCK_ORDER.MOVE:
        if (flock.targetX != null && dist(c.x, c.y, flock.targetX, flock.targetY) < 50) { flock.order = FLOCK_ORDER.NONE; flock.playerLocked = false; }
        break;
      case FLOCK_ORDER.ATTACK: {
        const enemies = this.sgrid.queryRadius(c.x, c.y, 500).filter(u => u.factionId !== flock.factionId && u.isAlive);
        if (enemies.length === 0) { flock.order = FLOCK_ORDER.NONE; flock.playerLocked = false; }
        break;
      }
      case 'occupy': {
        const b = flock.targetBaseId != null ? this.bases.get(flock.targetBaseId) : null;
        if (!b || b.factionId === flock.factionId) { flock.order = FLOCK_ORDER.NONE; flock.playerLocked = false; }
        break;
      }
      case FLOCK_ORDER.RETREAT: {
        const danger = this.enemyLocalPower(c.x, c.y, 250, flock.factionId);
        if (danger < 10) { flock.order = FLOCK_ORDER.NONE; flock.playerLocked = false; }
        break;
      }
      case FLOCK_ORDER.DEFEND:
      case FLOCK_ORDER.EXPLORE:
        break;
      default:
        flock.playerLocked = false;
    }
  }

  aiTick(dt) {
    for (const fac of this.factions.values()) {
      fac.thinkTimer -= dt;
      if (fac.thinkTimer > 0) continue;
      const diff = DIFFICULTY[fac.difficulty] || DIFFICULTY.normal;
      fac.thinkTimer = (fac.kind === 'player') ? 0.8 : diff.thinkInterval;
      const flocksOfFac = [];
      for (const fl of this.flocks.values()) if (fl.factionId === fac.id) flocksOfFac.push(fl);
      for (const flock of flocksOfFac) {
        if (fac.kind === 'player') {
          if (flock.playerLocked) this.maintainPlayerOrder(flock);
          else this.evaluateFlockUtility(flock, fac);
        } else if (fac.kind === 'neutral') this.evaluateFlockNeutral(flock);
        else this.evaluateFlockUtility(flock, fac);
      }
    }
  }

  /* ---------- 勢力評価・勝敗判定 ---------- */
  factionEvaluation() {
    const dim = Math.ceil(WORLD_SIZE / CELL);
    const totalCells = dim * dim;
    // 領土カウント
    const terrCount = new Map();
    if (this.territory) {
      for (let i = 0; i < this.territory.length; i++) {
        const fid = this.territory[i];
        if (fid !== 255) terrCount.set(fid, (terrCount.get(fid) || 0) + 1);
      }
    }
    for (const fac of this.factions.values()) {
      let power = 0;
      for (const id of fac.unitIds) { const u = this.units.get(id); if (u && u.isAlive) power += u.power; }
      fac.totalPower = Math.round(power);
      fac.applyMorale((100 - fac.morale) * 0.01);
      if (fac.kind !== 'neutral' && fac.population === 0 && fac.baseIds.size === 0) fac.alive = false;
      // 領土補正: 領土が広いほど戦力アップ (モナークモナーク式)
      const cells = terrCount.get(fac.id) || 0;
      fac.territoryCells = cells;
      const terrPct = cells / totalCells;
      fac.territoryMult = 1 + terrPct * 2.0; // 0%→1.0x / 25%→1.5x / 50%→2.0x
    }
    // プレイヤー占領率更新
    const playerCells = terrCount.get(0) || 0;
    this.territoryPct = Math.round(playerCells / totalCells * 100);
  }

  checkWinLose() {
    if (this.gameOver) return;
    const player = this.factions.get(0);
    // 自勢力全滅 or 本拠地喪失 → 敗北
    const playerHQ = Array.from(this.bases.values()).find(b => b.isHQ && b.originalFactionId === 0);
    if (!player.alive || (playerHQ && playerHQ.factionId !== 0)) {
      this.gameOver = 'lose';
      this.log(playerHQ && playerHQ.factionId !== 0 ? '本拠地が陥落した……敗北。' : '勢力が全滅した……敗北。');
      if (this.ui && this.ui.onGameOver) this.ui.onGameOver('lose');
      return;
    }
    const enemyFactions = Array.from(this.factions.values()).filter(f => f.kind === 'cpu');
    const enemiesAllDead = enemyFactions.every(f => !f.alive);
    // 敵全リーダー撃破 or 領土70%制圧 or スコア目標 → 勝利(モナークモナーク式)
    const allLeadersDead = enemyFactions.every(f => !f.alive || f.leaderId == null);
    const dominating = this.territoryPct >= 70;
    if (enemiesAllDead || allLeadersDead || dominating || player.score >= 450) {
      let reason = enemiesAllDead ? '敵勢力を全滅させた！' :
                   allLeadersDead ? '敵の王をすべて倒した！' :
                   dominating ? '領土の70%を制圧した！' : '高スコアで征服した！';
      this.gameOver = 'win';
      this.log(`勝利！${reason}`);
      if (this.ui && this.ui.onGameOver) this.ui.onGameOver('win');
    }
  }

  /* ---------- ランダムイベント ---------- */
  triggerRandomEvent() {
    const def = choice(RANDOM_EVENTS);
    this.nextEventAt = randRange(50, 90);
    this.log(`${def.label} ${def.desc}`);
    switch (def.key) {
      case 'harvest':
        this.activeEvent = { def, remain: def.duration };
        for (let i = 0; i < 20; i++) this.spawnFoodRandom();
        break;
      case 'plague':
        for (const fac of this.factions.values()) {
          let killed = 0;
          for (const id of Array.from(fac.unitIds)) {
            if (Math.random() < 0.06) { const u = this.units.get(id); if (u) { u.dead = true; killed++; } }
          }
        }
        break;
      case 'storm':
        this.activeEvent = { def, remain: def.duration };
        break;
      case 'quake':
        for (const b of this.bases.values()) b.population = Math.max(2, Math.round(b.population * 0.7));
        break;
      case 'migration':
        for (const fac of this.factions.values()) {
          const list = Array.from(fac.unitIds).slice(0, 6);
          for (const id of list) {
            const u = this.units.get(id);
            if (u) { const p = this.map.findLandSpawn(u.x + randRange(-120, 120), u.y + randRange(-120, 120), 60); u.x = p.x; u.y = p.y; }
          }
        }
        break;
    }
  }

  /* ---------- プレイヤー操作：選択・命令 ---------- */
  pickFlockAt(wx, wy, tolerance) {
    tolerance = tolerance || 24;
    let best = null, bd = Infinity;
    for (const fl of this.flocks.values()) {
      if (fl.factionId !== 0) continue;
      for (const id of fl.memberIds) {
        const u = this.units.get(id);
        if (!u || !u.isAlive) continue;
        const d = dist2(u.x, u.y, wx, wy);
        if (d < tolerance * tolerance && d < bd) { bd = d; best = fl; }
      }
    }
    return best;
  }
  clearSelection() {
    for (const id of this.selectedFlockIds) { const fl = this.flocks.get(id); if (fl) fl.selected = false; }
    this.selectedFlockIds.clear();
  }
  selectSingle(flock) {
    this.clearSelection();
    if (flock) { flock.selected = true; this.selectedFlockIds.add(flock.id); }
  }
  toggleAdd(flock) {
    if (!flock) return;
    if (this.selectedFlockIds.has(flock.id)) { flock.selected = false; this.selectedFlockIds.delete(flock.id); }
    else { flock.selected = true; this.selectedFlockIds.add(flock.id); }
  }
  boxSelect(x0, y0, x1, y1) {
    const minX = Math.min(x0, x1), maxX = Math.max(x0, x1);
    const minY = Math.min(y0, y1), maxY = Math.max(y0, y1);
    this.clearSelection();
    for (const fl of this.flocks.values()) {
      if (fl.factionId !== 0) continue;
      const c = fl.centroid(this.units);
      if (c && c.x >= minX && c.x <= maxX && c.y >= minY && c.y <= maxY) { fl.selected = true; this.selectedFlockIds.add(fl.id); }
    }
  }
  selectedFlocks() { return Array.from(this.selectedFlockIds).map(id => this.flocks.get(id)).filter(Boolean); }

  issueImmediateOrder(orderType) {
    const flocks = this.selectedFlocks();
    if (flocks.length === 0) return;
    for (const fl of flocks) {
      fl.playerLocked = true; fl.order = orderType;
      const c = fl.centroid(this.units);
      if (orderType === FLOCK_ORDER.DEFEND && c) { fl.targetX = c.x; fl.targetY = c.y; }
      if (orderType === FLOCK_ORDER.BUILD) { fl.playerLocked = true; /* 各ユニットが自己判断で建設位置決定 */ }
      if (orderType === FLOCK_ORDER.RETREAT) {
        const anyId = fl.memberIds.values().next().value;
        const u = anyId != null ? this.units.get(anyId) : null;
        const b = u ? this.nearestOwnBase(u) : null;
        if (b) { fl.targetX = b.x; fl.targetY = b.y; }
      }
      if (orderType === FLOCK_ORDER.EXPLORE && c) {
        const ang = Math.random() * Math.PI * 2, r = randRange(300, 700);
        fl.targetX = clamp(c.x + Math.cos(ang) * r, 50, WORLD_SIZE - 50);
        fl.targetY = clamp(c.y + Math.sin(ang) * r, 50, WORLD_SIZE - 50);
      }
    }
    this.log(`選択中の群れに「${this.orderLabel(orderType)}」を命令した。`);
  }
  beginTargetedOrder(orderType) {
    if (this.selectedFlocks().length === 0) { this.log('群れが選択されていない。'); return; }
    this.pendingCommand = orderType;
  }
  resolveTargetedTap(wx, wy) {
    const cmd = this.pendingCommand;
    this.pendingCommand = null;
    const flocks = this.selectedFlocks();
    if (!cmd || flocks.length === 0) return false;
    if (cmd === FLOCK_ORDER.MOVE) {
      for (const fl of flocks) { fl.playerLocked = true; fl.order = FLOCK_ORDER.MOVE; fl.targetX = wx; fl.targetY = wy; fl.targetBaseId = null; }
      this.log('移動命令を発令した。');
    } else if (cmd === FLOCK_ORDER.ATTACK) {
      const enemy = this.nearestEnemyUnitAtPoint(wx, wy, 90);
      for (const fl of flocks) {
        fl.playerLocked = true; fl.order = FLOCK_ORDER.ATTACK;
        fl.targetX = enemy ? enemy.x : wx; fl.targetY = enemy ? enemy.y : wy;
        fl.targetEnemyFactionId = enemy ? enemy.factionId : null;
      }
      this.log('攻撃命令を発令した。');
    } else if (cmd === 'occupy') {
      const b = this.nearestBaseAtPoint(wx, wy, 100);
      if (b) { for (const fl of flocks) { fl.playerLocked = true; fl.order = 'occupy'; fl.targetBaseId = b.id; fl.targetX = b.x; fl.targetY = b.y; } this.log(`${b.name}への占領命令を発令した。`); }
      else this.log('占領対象となる拠点が見つからない。');
    }
    return true;
  }
  nearestEnemyUnitAtPoint(x, y, radius) {
    let best = null, bd = Infinity;
    for (const u of this.units.values()) {
      if (u.factionId === 0 || !u.isAlive) continue;
      const d = dist2(u.x, u.y, x, y);
      if (d < radius * radius && d < bd) { bd = d; best = u; }
    }
    return best;
  }
  nearestBaseAtPoint(x, y, radius) {
    let best = null, bd = Infinity;
    for (const b of this.bases.values()) {
      const d = dist2(b.x, b.y, x, y);
      if (d < (radius + b.radius) * (radius + b.radius) && d < bd) { bd = d; best = b; }
    }
    return best;
  }
  orderLabel(o) {
    return { move: '移動', defend: '防衛', explore: '探索', occupy: '占領', attack: '攻撃', retreat: '撤退', none: '自律', food: '採食', build: '柵建設' }[o] || o;
  }

  getSelectedInfo() {
    const flocks = this.selectedFlocks();
    if (flocks.length === 0) return null;
    let count = 0, totalPow = 0, maxPow = 0, lvlSum = 0;
    let order = flocks[0].order;
    for (const fl of flocks) {
      for (const id of fl.memberIds) {
        const u = this.units.get(id);
        if (!u || !u.isAlive) continue;
        count++; totalPow += u.power; maxPow = Math.max(maxPow, u.power); lvlSum += u.level;
      }
    }
    return { count, totalPow, maxPow, avgLevel: count ? (lvlSum / count).toFixed(1) : 0, order, flockCount: flocks.length };
  }

  getRanking() {
    return Array.from(this.factions.values())
      .map(f => ({ id: f.id, name: f.name, color: f.color, pop: f.population, power: f.totalPower || 0, bases: f.baseIds.size, score: Math.round(f.score), alive: f.alive, morale: Math.round(f.morale), gold: Math.round(f.gold) }))
      .sort((a, b) => b.score - a.score);
  }

  /* ---------- 描画 ---------- */
  render() {
    const ctx = this.ctx, cv = this.canvas;
    ctx.save();

    // ===== 空背景グラデーション =====
    const sky = ctx.createLinearGradient(0, 0, 0, cv.height);
    sky.addColorStop(0,   '#3a7fc1');
    sky.addColorStop(0.5, '#6faad8');
    sky.addColorStop(1,   '#c8dff0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, cv.width, cv.height);

    if (!this.map) { ctx.restore(); return; }
    const cam = this.camera;
    const map = this.map;
    const z = cam.zoom;
    const showDetail = z > 0.5;
    const t = this.elapsed;

    // ===== カリング範囲 =====
    const vb = cam.viewBoundsWorld(CELL * 2.5);
    const gx0 = clamp(Math.floor(clamp(vb.x0, 0, WORLD_SIZE) / CELL) - 1, 0, map.dim - 1);
    const gx1 = clamp(Math.ceil (clamp(vb.x1, 0, WORLD_SIZE) / CELL) + 1, 0, map.dim - 1);
    const gy0 = clamp(Math.floor(clamp(vb.y0, 0, WORLD_SIZE) / CELL) - 1, 0, map.dim - 1);
    const gy1 = clamp(Math.ceil (clamp(vb.y1, 0, WORLD_SIZE) / CELL) + 1, 0, map.dim - 1);

    // ===== タイル奥行きソート =====
    const tileList = [];
    for (let gy = gy0; gy <= gy1; gy++)
      for (let gx = gx0; gx <= gx1; gx++) tileList.push(gx + gy * 10000);
    tileList.sort((a, b) => {
      const ax = a % 10000, ay = Math.floor(a / 10000);
      const bx = b % 10000, by = Math.floor(b / 10000);
      return (ax + ay) - (bx + by);
    });

    // ===== 地形描画 ヘルパー =====
    // 側面に石レンガのモルタルライン(水平線)を描く
    const _drawBrickLines = (p1, p2, p3, p4, lineColor, nLines) => {
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = Math.max(0.5, z * 0.7);
      for (let i = 1; i <= nLines; i++) {
        const s = i / (nLines + 1);
        const x1 = p1.x + (p4.x - p1.x) * s, y1 = p1.y + (p4.y - p1.y) * s;
        const x2 = p2.x + (p3.x - p2.x) * s, y2 = p2.y + (p3.y - p2.y) * s;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      }
    };

    // 上面に草/石テクスチャドットを散布
    const _drawTopTexture = (pts, tId, gx, gy) => {
      if (!showDetail) return;
      const cx = (pts[0].x + pts[1].x + pts[2].x + pts[3].x) / 4;
      const cy = (pts[0].y + pts[1].y + pts[2].y + pts[3].y) / 4;
      const hw = Math.abs(pts[1].x - pts[0].x) * 0.28;
      const hh = Math.abs(pts[2].y - pts[1].y) * 0.28;
      if (tId === TERRAIN.PLAIN.id) {
        ctx.fillStyle = 'rgba(80,130,40,0.35)';
        const seed = gx * 7 + gy * 13;
        for (let i = 0; i < 5; i++) {
          const px = cx + ((seed * (i + 3) * 17) % 100 - 50) / 100 * hw * 1.4;
          const py = cy + ((seed * (i + 7) * 11) % 100 - 50) / 100 * hh * 1.4;
          const r  = Math.max(0.8, z * 1.2);
          ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2); ctx.fill();
        }
      } else if (tId === TERRAIN.FOREST.id) {
        // 小さな三角形の木シルエット
        const seed = gx * 11 + gy * 17;
        for (let i = 0; i < 3; i++) {
          const px = cx + ((seed * (i + 2) * 19) % 100 - 50) / 100 * hw;
